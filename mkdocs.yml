site_name: abicheck
site_description: ABI compatibility checker for C/C++ shared libraries
site_url: https://abicheck.github.io/abicheck
repo_url: https://github.com/abicheck/abicheck
repo_name: abicheck/abicheck
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  # Track 2 (tool documentation), basics first: install & first check, then
  # day-to-day use, CI gating, specialised checks, then integrations/migration.
  - User Guide:
    - Start Here:
      - Getting Started: getting-started.md
      - Choose Your Workflow: user-guide/choose-your-workflow.md
      - 'Worked Example: Real Library': user-guide/real-world-example.md
      - 'Scanning a Conda-Forge Package': user-guide/scanning-conda-packages.md
    - Everyday Use:
      - CLI Usage: user-guide/cli-usage.md
      - Evidence, Build-Context & Debug Flags: user-guide/dump-compare-flags.md
      - Companion Commands: user-guide/companion-commands.md
      - Source-Scan Depth: user-guide/scan-levels.md
      - Producing Source Facts: user-guide/producing-source-facts.md
      - Output Formats: user-guide/output-formats.md
      - Baseline Management: user-guide/baseline-management.md
    - CI & Gating:
      - CI Gating Pipeline: user-guide/ci-gating.md
      - GitHub Action: user-guide/github-action.md
      - 'GitHub Action: More Recipes': user-guide/github-action-recipes.md
      - 'GitHub Action: Source Scans': user-guide/github-action-source-scans.md
      - GitHub PR Annotations: user-guide/annotations.md
      - Severity Configuration: user-guide/severity.md
      - Policy Profiles: user-guide/policies.md
      - Suppressions: user-guide/suppressions.md
    - Specialised Checks:
      - Debian Symbols Files: user-guide/debian-symbols.md
      - Multi-Binary Releases: user-guide/multi-binary.md
      - Application Compatibility: user-guide/appcompat.md
      - Plugin Systems: user-guide/plugin-systems.md
      - POST Python Manifests: user-guide/post-python.md
      - Build Evidence Setup: user-guide/build-evidence-setup.md
      - API Surface Intelligence: user-guide/api-surface-intelligence.md
      - Kernel & eBPF (BTF): user-guide/kernel-btf.md
      - Python Extensions (abi3): user-guide/python-extensions.md
      - Security Hardening: user-guide/security-hardening.md
      - Probe Harness: user-guide/probe-harness.md
    - Integrations & Migration:
      - Tool Modes: user-guide/tool-modes.md
      - Python API: user-guide/python-api.md
      - MCP Integration: user-guide/mcp-integration.md
      - Upgrading to 0.5.0: user-guide/migration-0.5.md
      - Migrating from ABICC: user-guide/from-abicc.md
      - Migrating from libabigail: user-guide/from-libabigail.md
  # How the tool works, simplest mental model first: what a verdict means →
  # what each data source can see → how the pipeline is built → deep internals.
  - Concepts:
    - Verdicts: concepts/verdicts.md
    - Evidence & Detectability: concepts/evidence-and-detectability.md
    - What Each Level Sees: concepts/what-each-level-sees.md
    - Architecture: concepts/architecture.md
    - Build Info & Sources (build-source data): concepts/build-source-data.md
    - Graph Coverage & Negative Evidence: concepts/graph-coverage.md
    - Unified Impact Assessment: concepts/impact-analysis.md
    - Environment & Toolchain Drift: concepts/environment-drift.md
    - Limitations: concepts/limitations.md
  # Lookup tables — precise, exhaustive, no narrative.
  - Reference:
    - Change Kinds: reference/change-kinds.md
    - Detector Spec Matrix: reference/detector-spec.md
    - Exit Codes: reference/exit-codes.md
    - Snapshot Format: reference/snapshot-format.md
    - Build Output Schema: reference/build-output-schema.md
