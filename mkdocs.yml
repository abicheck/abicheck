site_name: abicheck
site_description: ABI compatibility checker for C/C++ shared libraries
site_url: https://abicheck.github.io/abicheck
repo_url: https://github.com/abicheck/abicheck
repo_name: abicheck/abicheck
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  # Track 2 (tool documentation), basics first: install & first check, then
  # day-to-day use, CI gating, specialised checks, then integrations/migration.
  - User Guide:
    - Start Here:
      - Getting Started: getting-started.md
      - Choose Your Workflow: user-guide/choose-your-workflow.md
      - 'Worked Example: Real Library': user-guide/real-world-example.md
      - 'Scanning a Conda-Forge Package': user-guide/scanning-conda-packages.md
    - Everyday Use:
      - CLI Usage: user-guide/cli-usage.md
      - Evidence, Build-Context & Debug Flags: user-guide/dump-compare-flags.md
      - Companion Commands: user-guide/companion-commands.md
      - Source-Scan Depth: user-guide/scan-levels.md
      - Producing Source Facts: user-guide/producing-source-facts.md
      - Output Formats: user-guide/output-formats.md
      - Baseline Management: user-guide/baseline-management.md
    - CI & Gating:
      - CI Gating Pipeline: user-guide/ci-gating.md
      - GitHub Action: user-guide/github-action.md
      - 'GitHub Action: More Recipes': user-guide/github-action-recipes.md
      - 'GitHub Action: Source Scans': user-guide/github-action-source-scans.md
      - GitHub PR Annotations: user-guide/annotations.md
      - Severity Configuration: user-guide/severity.md
      - Policy Profiles: user-guide/policies.md
      - Suppressions: user-guide/suppressions.md
    - Specialised Checks:
      - Debian Symbols Files: user-guide/debian-symbols.md
      - Multi-Binary Releases: user-guide/multi-binary.md
      - Application Compatibility: user-guide/appcompat.md
      - Plugin Systems: user-guide/plugin-systems.md
      - POST Python Manifests: user-guide/post-python.md
      - Build Evidence Setup: user-guide/build-evidence-setup.md
      - API Surface Intelligence: user-guide/api-surface-intelligence.md
      - Kernel & eBPF (BTF): user-guide/kernel-btf.md
      - Python Extensions (abi3): user-guide/python-extensions.md
      - Security Hardening: user-guide/security-hardening.md
      - Probe Harness: user-guide/probe-harness.md
    - Integrations & Migration:
      - Tool Modes: user-guide/tool-modes.md
      - Python API: user-guide/python-api.md
      - MCP Integration: user-guide/mcp-integration.md
      - Upgrading to 0.5.0: user-guide/migration-0.5.md
      - Migrating from ABICC: user-guide/from-abicc.md
      - Migrating from libabigail: user-guide/from-libabigail.md
  # How the tool works, simplest mental model first: what a verdict means →
  # what each data source can see → how the pipeline is built → deep internals.
  - Concepts:
    - Verdicts: concepts/verdicts.md
    - Evidence & Detectability: concepts/evidence-and-detectability.md
    - What Each Level Sees: concepts/what-each-level-sees.md
    - Architecture: concepts/architecture.md
    - Build Info & Sources (build-source data): concepts/build-source-data.md
    - Graph Coverage & Negative Evidence: concepts/graph-coverage.md
    - Environment & Toolchain Drift: concepts/environment-drift.md
    - Limitations: concepts/limitations.md
  # Lookup tables — precise, exhaustive, no narrative.
  - Reference:
    - Change Kinds: reference/change-kinds.md
    - Detector Spec Matrix: reference/detector-spec.md
    - Exit Codes: reference/exit-codes.md
    - Snapshot Format: reference/snapshot-format.md
    - Build Output Schema: reference/build-output-schema.md
    - Project Targets Schema: reference/project-targets-schema.md
    - Configuration File: reference/config-file.md
    - Environment Variables: reference/environment.md
    - Platforms: reference/platforms.md
    - Tool Comparison: reference/tool-comparison.md
    - ABICC Flag Reference: reference/abicc-flags.md
    - GitHub Action Inputs/Outputs: reference/github-action-inputs.md
  # Track 1 (educational): what ABI/API compatibility is and how to manage it,
  # from first principles (series part 0) to expert-level design guidance.
  - ABI/API Handling & Recommendations:
    - Overview: concepts/abi-api-handling.md
    - ABI Cheat Sheet: concepts/abi-cheat-sheet.md
    - Deep Dives:
      - Your ABI Surface: concepts/abi-surface.md
      - Class Layout ABI & API: concepts/class-layout-abi.md
      - Dependency & Runtime Floors: concepts/dependency-floors.md
    - Learning Series:
      - "ABI in Five Minutes": concepts/abi-series/abi-in-5-minutes.md
      - "0. Compatibility as a Product Contract": concepts/abi-series/00-product-contract.md
      - "1. Foundations": concepts/abi-series/01-foundations.md
      - "2. Symbol Contracts": concepts/abi-series/02-symbol-contracts.md
      - "3. Type Layout": concepts/abi-series/03-type-layout.md
      - "4. C++ ABI": concepts/abi-series/04-cpp-abi.md
      - "5. Linker & ELF": concepts/abi-series/05-linker-elf.md
      - "6. Transitive Breaks": concepts/abi-series/06-transitive-breaks.md
      - "7. Designing for Stability": concepts/abi-series/07-designing-for-stability.md
      - "8. Detecting Breaks": concepts/abi-series/08-detection.md
      - "Glossary": concepts/abi-series/glossary.md
  # The case catalog: every break scenario as a compilable fixture, browsable
  # by verdict (what abicheck reports) or by category (what kind of change).
  - Examples:
    - All Cases: examples/index.md
    - By Verdict:
      - "BREAKING": examples/by-verdict/breaking.md
      - "API_BREAK": examples/by-verdict/api-break.md
      - "COMPATIBLE_WITH_RISK": examples/by-verdict/compatible-risk.md
      - "COMPATIBLE": examples/by-verdict/compatible.md
      - "NO_CHANGE": examples/by-verdict/no-change.md
    - By Category:
      - Breaking: examples/by-category/breaking.md
      - API Break: examples/by-category/api_break.md
      - Risk: examples/by-category/risk.md
      - Addition: examples/by-category/addition.md
      - Quality: examples/by-category/quality.md
      - No Change: examples/by-category/no_change.md
  # Contributor-facing docs. Internal planning artifacts (implementation plans,
  # backlog, roadmap audits, archived status notes) stay in the repo under
  # docs/development/ but are intentionally kept out of the published nav — see
  # the "Working documents" note in the Codebase Overview.
  - Development:
    - Contributing:
      - Codebase Overview: development/codebase-overview.md
      - Writing Documentation: development/documentation.md
      - Testing: development/testing.md
      - Performance: development/performance.md
      - Troubleshooting: troubleshooting.md
    - Roadmap & Status:
      - Goals: development/goals.md
      - SciPy / Scientific-Python Roadmap: development/scipy-scientific-python-roadmap.md
      - Python Build Ecosystem Positioning: development/python-build-ecosystem-positioning.md
    - Parity & Reports:
      - ABICC Parity Status: development/abicc-parity-status.md
      - ABICC Test Coverage Comparison: development/abicc-test-coverage-comparison.md
      - ABICC Format Compliance: reference/abicc-format-compliance.md
      - libabigail Parity Matrix: development/libabigail-parity.md
      - Report Comparison: development/report-comparison.md
      - SYCL test/abi Coverage: reference/sycl-test-abi-coverage.md
    - ADR:
      - Overview: development/adr/index.md

# Agent instructions are repo-internal context, not published documentation.
exclude_docs: |
  CLAUDE.md
  AGENTS.md

plugins:
  - search
  # Old URLs of pages merged/moved by the docs-structure consolidation keep
  # working via client-side redirect stubs (external bookmarks, search hits).
  - redirects:
      redirect_maps:
        concepts/scan-and-evidence-levels.md: concepts/evidence-and-detectability.md
        concepts/verdicts-and-exit-codes.md: concepts/verdicts.md
        concepts/api-surface-intelligence.md: user-guide/api-surface-intelligence.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/abicheck/abicheck
