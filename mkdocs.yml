    - resolve-baseline Action: reference/resolve-baseline.md
    - Configuration File: reference/config-file.md
    - Environment Variables: reference/environment.md
    - Platforms: reference/platforms.md
    - Tool Comparison: reference/tool-comparison.md
    - ABICC Flag Reference: reference/abicc-flags.md
  # Track 1 (educational): what ABI/API compatibility is and how to manage it,
  # from first principles (series part 0) to expert-level design guidance.
  - ABI/API Handling & Recommendations:
    - Overview: concepts/abi-api-handling.md
    - ABI Cheat Sheet: concepts/abi-cheat-sheet.md
    - Deep Dives:
      - Your ABI Surface: concepts/abi-surface.md
      - Class Layout ABI & API: concepts/class-layout-abi.md
