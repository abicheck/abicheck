name: Docs PR Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'abicheck/schemas/**'
      - 'examples/**'
      - 'mkdocs.yml'
      - 'scripts/gen_examples_docs.py'
      - 'scripts/publish_schemas.py'
      - '.github/workflows/pages.yml'
      - '.github/workflows/docs-pr.yml'

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip

      - name: Install MkDocs + Material theme
        run: pip install mkdocs mkdocs-material mkdocs-redirects

      - name: Check generated documentation assets are up to date
        run: |
          python scripts/gen_examples_docs.py --check
          python scripts/publish_schemas.py --check

      - name: Build docs (strict)
        run: mkdocs build --strict
