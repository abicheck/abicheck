# ADR-038 Flow C — build the Clang facts plugin against several LLVM/Clang
# majors (with GCC and Clang as the host compiler), run the C.6 differential-
# conformance test, and validate the end-to-end scan flow on each. The plugin is
# ABI-locked to its LLVM major (ADR-038 C.5), so it cannot ship one .so for
# every clang; this validates parity per-version instead. Each leg also proves
# the emitted pack is consumable by the ordinary scan pipeline (dump → merge →
# compare), not just entity-equivalent. Non-blocking: it is a standalone
# workflow, not part of the required abicheck CI gates, and is path-filtered to
# the plugin + the clang-recipe modules it mirrors.
name: clang-plugin

on:
  push:
    paths:
      - "contrib/abicheck-clang-plugin/**"
      - ".github/workflows/clang-plugin.yml"
      - "abicheck/buildsource/source_extractors/clang.py"
      - "abicheck/buildsource/source_extractors/clang_public_roots.py"
      - "abicheck/buildsource/source_extractors/_argv.py"
      - "abicheck/buildsource/inputs_pack.py"
      - "abicheck/buildsource/inputs_emit.py"
      - "abicheck/buildsource/source_abi.py"
      - "abicheck/provenance.py"
  pull_request:
    paths:
      - "contrib/abicheck-clang-plugin/**"
      - ".github/workflows/clang-plugin.yml"
      - "abicheck/buildsource/source_extractors/clang.py"
      - "abicheck/buildsource/source_extractors/clang_public_roots.py"
      - "abicheck/buildsource/source_extractors/_argv.py"
      - "abicheck/buildsource/inputs_pack.py"
      - "abicheck/buildsource/inputs_emit.py"
      - "abicheck/buildsource/source_abi.py"
      - "abicheck/provenance.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: clang-plugin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conformance:
    name: C.6 + scan (LLVM ${{ matrix.llvm }}, host ${{ matrix.host_cxx }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      # Two dimensions:
      #  * LLVM major — the plugin is ABI-locked to its LLVM (C.5), so parity is
      #    validated per-version. Each major is pinned to a runner whose
      #    apt.llvm.org channel publishes it (16 is jammy-only; noble-16 does not
      #    exist; 17/18 are on noble).
      #  * Host C++ compiler — the plugin is a plain LLVM shared module, so it
      #    must build with either GCC or Clang as the *host* compiler. LLVM 18
      #    is built both ways (g++ and clang++) to prove that; 16/17 use the
      #    distro default (g++) to keep the matrix small.
      matrix:
        include:
          - { llvm: "16", runner: "ubuntu-22.04", host_cc: "gcc",   host_cxx: "g++" }
          - { llvm: "17", runner: "ubuntu-24.04", host_cc: "gcc",   host_cxx: "g++" }
          - { llvm: "18", runner: "ubuntu-24.04", host_cc: "gcc",   host_cxx: "g++" }
          - { llvm: "18", runner: "ubuntu-24.04", host_cc: "clang", host_cxx: "clang++" }
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install LLVM/Clang ${{ matrix.llvm }}
        env:
          # apt.llvm.org archive signing key (Sylvestre Ledru / Debian LLVM).
          # Pinned so the fetched key is verified before it is trusted — we set
          # up the apt repo declaratively instead of piping the unversioned
          # remote llvm.sh installer into `sudo` (a trusted package install
          # path, per review).
          LLVM_KEY_FPR: "6084F3CF814B57C1CF12EFD515CF4D18AF4F7421"
        run: |
          set -euxo pipefail
          key=/tmp/llvm-snapshot.gpg.key
          wget -q -O "$key" https://apt.llvm.org/llvm-snapshot.gpg.key
          # Verify the fetched key's fingerprint before trusting it.
          got=$(gpg --show-keys --with-colons --with-fingerprint "$key" \
                | awk -F: '/^fpr:/ {print $10; exit}')
          test "$got" = "$LLVM_KEY_FPR"
          sudo install -m 0644 "$key" /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          codename=$(. /etc/os-release && echo "$VERSION_CODENAME")
          echo "deb http://apt.llvm.org/${codename}/ llvm-toolchain-${codename}-${{ matrix.llvm }} main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y \
            llvm-${{ matrix.llvm }}-dev \
            libclang-${{ matrix.llvm }}-dev \
            clang-${{ matrix.llvm }} \
            cmake ninja-build
          # Pin `clang`/`clang++` on PATH to the matrix version, so the plugin
          # (linked against LLVM N) and the wrapper's clang extractor use the
          # SAME clang — the precondition for byte-for-byte hash parity (D0/C.6).
          sudo ln -sf /usr/bin/clang-${{ matrix.llvm }} /usr/local/bin/clang
          sudo ln -sf /usr/bin/clang++-${{ matrix.llvm }} /usr/local/bin/clang++
          clang --version

      - name: Install abicheck
        run: pip install -e ".[dev]"

      - name: Build the plugin (host ${{ matrix.host_cxx }})
        run: |
          set -eux
          # Ensure the selected host compiler is present (clang comes from the
          # LLVM install above; gcc/g++ ship on the runner).
          ${{ matrix.host_cxx }} --version
          cmake -S contrib/abicheck-clang-plugin -B build/plugin -G Ninja \
            -DCMAKE_PREFIX_PATH="/usr/lib/llvm-${{ matrix.llvm }}" \
            -DCMAKE_C_COMPILER="${{ matrix.host_cc }}" \
            -DCMAKE_CXX_COMPILER="${{ matrix.host_cxx }}"
          cmake --build build/plugin
          test -f build/plugin/libabicheck-facts.so

      - name: Run C.6 differential conformance
        run: |
          python contrib/abicheck-clang-plugin/tests/conformance.py \
            --plugin build/plugin/libabicheck-facts.so \
            --clangxx clang++

      - name: Validate the Flow C scan flow (dump → merge → compare)
        run: |
          python contrib/abicheck-clang-plugin/tests/scan_flow.py \
            --plugin build/plugin/libabicheck-facts.so \
            --clangxx clang++
