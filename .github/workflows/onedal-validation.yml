name: oneDAL Validation

on:
  workflow_dispatch:
  schedule:
    - cron: "43 5 * * 1"
  pull_request:
    paths:
      - "abicheck/**"
      - "tests/**"
      - "validation/scripts/run_oneapi_scan.py"
      - "docs/user-guide/scanning-conda-packages.md"
      - ".github/workflows/onedal-validation.yml"

permissions:
  contents: read

jobs:
  conda-package-scan:
    name: oneDAL conda package scan
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y castxml gcc g++ clang binutils zstd bzip2

      - name: Install abicheck
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install micromamba
        run: |
          set -euo pipefail
          curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest \
            | tar -xvj bin/micromamba
          echo "$PWD/bin" >> "$GITHUB_PATH"

      - name: Install oneDAL conda packages
        run: |
          set -euo pipefail
          micromamba create -y -p "$PWD/.onedal-env" -c conda-forge \
            dal=2026.1.0 dal-devel=2026.1.0 dal-include=2026.1.0

      - name: Scan oneDAL core with shipped headers
        run: |
          set -euo pipefail
          mkdir -p reports/onedal
          prefix="$PWD/.onedal-env"
          binary="$(find "$prefix/lib" -maxdepth 1 -type f -name 'libonedal_core.so*' ! -type l | sort -V | tail -1)"
          test -n "$binary" || { echo "libonedal_core.so* not found"; exit 1; }
          test -f "$prefix/include/oneapi/dal.hpp" || { echo "oneapi/dal.hpp not found"; exit 1; }
          abicheck scan \
            --binary "$binary" \
            -H "$prefix/include/oneapi/dal.hpp" \
            --public-header-dir "$prefix/include" \
            --lang c++ \
            --audit \
            --depth headers \
            --format json \
            -o reports/onedal/onedal-core-scan.json
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("reports/onedal/onedal-core-scan.json").read_text())
          print("oneDAL scan verdict:", data.get("verdict"))
          print("oneDAL findings:", len(data.get("changes", []) or data.get("findings", []) or []))
          PY

      - name: Upload oneDAL validation artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: onedal-validation
          path: reports/onedal
