name: Temporary large L2 and CastXML probe

on:
  pull_request:
    paths:
      - scripts/profile_large_l2_castxml_v3.py
      - .github/workflows/l2-large-castxml-probe.yml

permissions:
  contents: read

concurrency:
  group: temporary-l2-large-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  profile:
    name: Profile large L2 scans on current main
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      ABICHECK_MAIN_SHA: 488f823cd58459307d969d92b9c5567d590043fd
      PYTHONHASHSEED: "0"
    steps:
      - name: Checkout probe branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install native benchmark dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            castxml clang cmake curl gcc g++ git jq libclang-dev libeigen3-dev \
            libjemalloc2 libssl-dev libtbb-dev llvm-dev ninja-build strace time \
            unzip xz-utils

      - name: Install current-main source
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Verify production source identity
        run: |
          git fetch --no-tags origin main
          test "$(git rev-parse origin/main)" = "$ABICHECK_MAIN_SHA"
          git diff --exit-code "$ABICHECK_MAIN_SHA" -- abicheck pyproject.toml
          python - <<'PY'
          import abicheck, pathlib
          print("abicheck:", pathlib.Path(abicheck.__file__).resolve())
          PY
          python -m py_compile scripts/profile_large_l2_castxml_v3.py
          castxml --version
          gcc --version | head -1
          clang --version | head -1
          llvm-config --version
          free -h
          df -h / /dev/shm

      - name: Build current CastXML source against system LLVM
        continue-on-error: true
        run: |
          set -euxo pipefail
          rm -rf /tmp/CastXML-src /tmp/CastXML-build
          git clone --depth 1 https://github.com/CastXML/CastXML.git /tmp/CastXML-src
          llvm_dir="$(llvm-config --cmakedir)"
          clang_config="$(find /usr/lib/llvm-* -path '*/lib/cmake/clang/ClangConfig.cmake' | sort -V | tail -1)"
          test -n "$clang_config"
          clang_dir="$(dirname "$clang_config")"
          cmake -S /tmp/CastXML-src -B /tmp/CastXML-build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_DIR="$llvm_dir" \
            -DClang_DIR="$clang_dir"
          cmake --build /tmp/CastXML-build --target castxml -- -j2
          bin="$(find /tmp/CastXML-build -type f -name castxml -perm -111 | head -1)"
          test -n "$bin"
          "$bin" --version
          git -C /tmp/CastXML-src rev-parse HEAD
          echo "CASTXML_NEW_BIN=$bin" >> "$GITHUB_ENV"
          echo "CASTXML_NEW_SHA=$(git -C /tmp/CastXML-src rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Run targeted large L2 and CastXML benchmark
        run: |
          rm -rf results/l2-large-castxml
          mkdir -p results/l2-large-castxml
          set +e
          python scripts/profile_large_l2_castxml_v3.py \
            --main-sha "$ABICHECK_MAIN_SHA" \
            --out-dir results/l2-large-castxml \
            >results/l2-large-castxml/probe-v3.log 2>&1
          rc=$?
          cat results/l2-large-castxml/probe-v3.log
          exit "$rc"

      - name: Upload profiling artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: large-l2-castxml-v3-main-488f823
          path: results/l2-large-castxml/
          if-no-files-found: warn
          retention-days: 7
