name: AgentReady

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Repository Scan
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: agentready
        uses: napetrov/agentready@main
        with:
          mode: scan
          job-summary: true
          upload-sarif: true
      - name: Check SARIF has findings
        id: sarif_check
        if: always() && steps.agentready.outputs.sarif-report-path
        run: |
          # codeql-action rejects the *whole file* if even one result has no
          # location ("locationFromSarifResult: expected at least one
          # location") -- agentready emits one result per checked rule
          # (including passing/informational ones), some of which are
          # repo-level and carry no location, so counting *any* result
          # (locationless or not) doesn't predict the failure. Count only
          # results missing a non-empty locations array.
          missing=$(jq '[.runs[].results[]? | select((.locations // []) | length == 0)] | length' "${{ steps.agentready.outputs.sarif-report-path }}")
          echo "missing_location_count=$missing" >> "$GITHUB_OUTPUT"
      - name: Upload SARIF
        # Skip the upload entirely when any result lacks a location --
        # codeql-action cannot process the file at all in that case, so
        # there's nothing salvageable to upload.
        if: always() && steps.agentready.outputs.sarif-report-path && steps.sarif_check.outputs.missing_location_count == '0'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.agentready.outputs.sarif-report-path }}
          category: agentready

  diff:
    name: PR Readiness Diff
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: agentready
        uses: napetrov/agentready@main
        with:
          mode: diff
          base-ref: origin/${{ github.base_ref }}
          head-ref: HEAD
          fail-on-regression: true
          job-summary: true
          pr-comment: true
          upload-sarif: true
      - name: Check SARIF has findings
        id: sarif_check
        if: always() && steps.agentready.outputs.sarif-report-path
        run: |
          # codeql-action rejects the *whole file* if even one result has no
          # location ("locationFromSarifResult: expected at least one
          # location") -- agentready emits one result per checked rule
          # (including passing/informational ones), some of which are
          # repo-level and carry no location, so counting *any* result
          # (locationless or not) doesn't predict the failure. Count only
          # results missing a non-empty locations array.
          missing=$(jq '[.runs[].results[]? | select((.locations // []) | length == 0)] | length' "${{ steps.agentready.outputs.sarif-report-path }}")
          echo "missing_location_count=$missing" >> "$GITHUB_OUTPUT"
      - name: Upload SARIF
        # Skip the upload entirely when any result lacks a location --
        # codeql-action cannot process the file at all in that case, so
        # there's nothing salvageable to upload.
        if: always() && steps.agentready.outputs.sarif-report-path && steps.sarif_check.outputs.missing_location_count == '0'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.agentready.outputs.sarif-report-path }}
          category: agentready
