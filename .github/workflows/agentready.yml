name: AgentReady

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    name: Repository Scan
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0
      - id: agentready
        uses: napetrov/agentready@ad673222d20c6bc9358b6d6d8d72ebb91141e1a7  # main
        with:
          mode: scan
          job-summary: true
          upload-sarif: true
      - name: Filter locationless SARIF results
        if: always() && steps.agentready.outputs.sarif-report-path
        run: |
          # codeql-action rejects the *whole file* if even one result has no
          # location ("locationFromSarifResult: expected at least one
          # location") -- agentready emits one result per checked rule
          # (including passing/informational ones), some of which are
          # repo-level and carry no location. Skipping the upload outright
          # (the previous approach) also threw away every valid, location-
          # bearing finding whenever a single locationless one was mixed in.
          # Filter out only the locationless entries so real findings still
          # reach code scanning; codeql-action accepts a run with zero
          # results fine, so no further gating is needed after this.
          f="${{ steps.agentready.outputs.sarif-report-path }}"
          jq '(.runs[].results) |= [.[] | select((.locations // []) | length > 0)]' "$f" > "$f.filtered"
          mv "$f.filtered" "$f"
      - name: Upload SARIF
        if: always() && steps.agentready.outputs.sarif-report-path
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        with:
          sarif_file: ${{ steps.agentready.outputs.sarif-report-path }}
          category: agentready

  diff:
    name: PR Readiness Diff
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0
      - id: agentready
        uses: napetrov/agentready@ad673222d20c6bc9358b6d6d8d72ebb91141e1a7  # main
        with:
          mode: diff
          base-ref: origin/${{ github.base_ref }}
          head-ref: HEAD
          fail-on-regression: true
          job-summary: true
          pr-comment: true
          upload-sarif: true
      - name: Filter locationless SARIF results
        if: always() && steps.agentready.outputs.sarif-report-path
        run: |
          # codeql-action rejects the *whole file* if even one result has no
          # location ("locationFromSarifResult: expected at least one
          # location") -- agentready emits one result per checked rule
          # (including passing/informational ones), some of which are
          # repo-level and carry no location. Skipping the upload outright
          # (the previous approach) also threw away every valid, location-
          # bearing finding whenever a single locationless one was mixed in.
          # Filter out only the locationless entries so real findings still
          # reach code scanning; codeql-action accepts a run with zero
          # results fine, so no further gating is needed after this.
          f="${{ steps.agentready.outputs.sarif-report-path }}"
          jq '(.runs[].results) |= [.[] | select((.locations // []) | length > 0)]' "$f" > "$f.filtered"
          mv "$f.filtered" "$f"
      - name: Upload SARIF
        if: always() && steps.agentready.outputs.sarif-report-path
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        with:
          sarif_file: ${{ steps.agentready.outputs.sarif-report-path }}
          category: agentready
