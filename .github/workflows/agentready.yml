name: AgentReady

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Repository Scan
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: agentready
        uses: napetrov/agentready@main
        with:
          mode: scan
          job-summary: true
          upload-sarif: true
      - name: Check SARIF has findings
        id: sarif_check
        if: always() && steps.agentready.outputs.sarif-report-path
        run: |
          count=$(jq '[.runs[].results[]?] | length' "${{ steps.agentready.outputs.sarif-report-path }}")
          echo "count=$count" >> "$GITHUB_OUTPUT"
      - name: Upload SARIF
        # codeql-action rejects a SARIF file with zero results
        # ("locationFromSarifResult: expected at least one location"), so skip
        # the upload entirely when there is nothing to report.
        if: always() && steps.agentready.outputs.sarif-report-path && steps.sarif_check.outputs.count != '0'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.agentready.outputs.sarif-report-path }}
          category: agentready

  diff:
    name: PR Readiness Diff
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: agentready
        uses: napetrov/agentready@main
        with:
          mode: diff
          base-ref: origin/${{ github.base_ref }}
          head-ref: HEAD
          fail-on-regression: true
          job-summary: true
          pr-comment: true
          upload-sarif: true
      - name: Check SARIF has findings
        id: sarif_check
        if: always() && steps.agentready.outputs.sarif-report-path
        run: |
          count=$(jq '[.runs[].results[]?] | length' "${{ steps.agentready.outputs.sarif-report-path }}")
          echo "count=$count" >> "$GITHUB_OUTPUT"
      - name: Upload SARIF
        # codeql-action rejects a SARIF file with zero results
        # ("locationFromSarifResult: expected at least one location"), so skip
        # the upload entirely when there is nothing to report.
        if: always() && steps.agentready.outputs.sarif-report-path && steps.sarif_check.outputs.count != '0'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.agentready.outputs.sarif-report-path }}
          category: agentready
