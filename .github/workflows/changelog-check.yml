name: Changelog Fragment Check

# Requires PRs that touch abicheck/**/*.py to add a changelog.d/ fragment
# (scriv-managed, see changelog.d/README.md) instead of hand-editing
# CHANGELOG.md's shared "Unreleased" section — that pattern was causing
# near-constant merge conflicts (most PRs touched the same few lines).
# Bypass with the `skip-changelog` label for changes with no user-facing
# effect (internal refactors, test-only PRs).

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changelog-fragment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch PR base ref
        # No --depth here: fetch-depth: 0 above already gives a full,
        # unshallow history, and the next step's `base...head` diff needs
        # a real merge-base walk. A --depth=1 fetch of base.sha can mark
        # it as a shallow-grafted boundary even in an already-unshallow
        # repo, which breaks that merge-base computation.
        run: git fetch origin "${{ github.event.pull_request.base.sha }}"

      - name: Check for a changelog fragment
        run: |
          python3 scripts/check_changelog_fragment.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            ${{ contains(github.event.pull_request.labels.*.name, 'skip-changelog') && '--skip-label' || '' }}
