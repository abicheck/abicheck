name: Test GitHub Action

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'action.yml'
      - 'action/**'
      - 'actions/check-target/**'
      - 'actions/resolve-baseline/**'
      - 'abicheck/**'
      - '.github/workflows/test-action.yml'
      - 'tests/fixtures/action/**'
  push:
    branches: [main]
    paths:
      - 'action.yml'
      - 'action/**'
      - 'actions/check-target/**'
      - 'actions/resolve-baseline/**'
      - 'abicheck/**'
      - '.github/workflows/test-action.yml'
      - 'tests/fixtures/action/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  # ── Test B: compare mode with snapshot fixtures (no system deps) ──────────
  test-compare-breaking:
    name: 'Compare: detect breaking change'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run abicheck (breaking case)
        id: abi
        uses: ./
        with:
          old-library: tests/fixtures/action/action_test_v1.json
          new-library: tests/fixtures/action/action_test_v2.json
          old-version: '1.0'
          new-version: '2.0'
          format: markdown
          install-deps: false
          fail-on-breaking: false  # don't fail the test job

      - name: Verify verdict is BREAKING
        shell: bash
        run: |
          echo "Verdict: ${{ steps.abi.outputs.verdict }}"
          echo "Exit code: ${{ steps.abi.outputs.exit-code }}"
          if [[ "${{ steps.abi.outputs.verdict }}" != "BREAKING" ]]; then
            echo "::error::Expected verdict BREAKING, got ${{ steps.abi.outputs.verdict }}"
            exit 1
          fi
          if [[ "${{ steps.abi.outputs.exit-code }}" != "4" ]]; then
            echo "::error::Expected exit code 4, got ${{ steps.abi.outputs.exit-code }}"
            exit 1
          fi

  test-compare-compatible:
    name: 'Compare: compatible (no change)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run abicheck (compatible case)
        id: abi
        uses: ./
        with:
          old-library: tests/fixtures/action/action_test_v1.json
          new-library: tests/fixtures/action/action_test_v1_compat.json
          old-version: '1.0'
          new-version: '1.1'
          install-deps: false

      - name: Verify verdict is COMPATIBLE
        shell: bash
        run: |
          echo "Verdict: ${{ steps.abi.outputs.verdict }}"
          if [[ "${{ steps.abi.outputs.verdict }}" != "COMPATIBLE" ]]; then
            echo "::error::Expected verdict COMPATIBLE, got ${{ steps.abi.outputs.verdict }}"
            exit 1
          fi

  test-compare-sarif:
    name: 'Compare: SARIF output'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run abicheck (SARIF format)
        id: abi
        uses: ./
        with:
          old-library: tests/fixtures/action/action_test_v1.json
          new-library: tests/fixtures/action/action_test_v2.json
          format: sarif
          output-file: results.sarif
          install-deps: false
          fail-on-breaking: false

      - name: Validate SARIF is valid JSON
        shell: bash
        run: python -m json.tool results.sarif > /dev/null

      - name: Validate SARIF structure
        shell: bash
        run: |
          python -c "
          import json, sys
          with open('results.sarif') as f:
              sarif = json.load(f)
          assert sarif['version'] == '2.1.0', 'Bad SARIF version'
          assert len(sarif['runs']) == 1, 'Expected exactly one run'
          run = sarif['runs'][0]
          assert run['tool']['driver']['name'] == 'abicheck', 'Bad tool name'
          assert len(run['results']) > 0, 'Expected at least one result'
          print(f'SARIF OK: {len(run[\"results\"])} result(s), {len(run[\"tool\"][\"driver\"][\"rules\"])} rule(s)')
          "

      - name: Verify report-path output
        shell: bash
        run: |
          if [[ "${{ steps.abi.outputs.report-path }}" != "results.sarif" ]]; then
            echo "::error::Expected report-path=results.sarif, got ${{ steps.abi.outputs.report-path }}"
            exit 1
          fi

  test-compare-json:
    name: 'Compare: JSON output'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run abicheck (JSON format)
        id: abi
        uses: ./
        with:
          old-library: tests/fixtures/action/action_test_v1.json
          new-library: tests/fixtures/action/action_test_v2.json
          format: json
          output-file: results.json
          install-deps: false
          fail-on-breaking: false

      - name: Validate JSON output
        shell: bash
        run: |
          python -c "
          import json
          with open('results.json') as f:
              data = json.load(f)
          assert 'verdict' in data, 'Missing verdict key'
          assert data['verdict'] == 'BREAKING', f'Expected BREAKING, got {data[\"verdict\"]}'
          print(f'JSON report OK: verdict={data[\"verdict\"]}')
          "

  # ── Test C: fail-on-breaking behaviour ──────────────────────────────────
  test-fail-on-breaking:
    name: 'Verify fail-on-breaking=true fails the step'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run abicheck (should fail)
        id: abi
        uses: ./
        continue-on-error: true
        with:
          old-library: tests/fixtures/action/action_test_v1.json
          new-library: tests/fixtures/action/action_test_v2.json
          install-deps: false
          fail-on-breaking: true

      - name: Verify step failed
        shell: bash
        run: |
          if [[ "${{ steps.abi.outcome }}" != "failure" ]]; then
            echo "::error::Expected step to fail, but outcome was ${{ steps.abi.outcome }}"
            exit 1
          fi
          echo "Correctly failed on breaking change"

  # ── Test: action infrastructure (compare mode, no real binary needed) ──────
  # TODO: add a true dump-mode test when a real binary/header fixture is available.
  test-action-infrastructure:
    name: 'Verify: action infrastructure with compare mode'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Test dump mode with a real ELF if castxml is available,
      # otherwise just verify the action doesn't crash with bad input
      # and gives a useful error. For now, test the action machinery
      # with a simple compare since dump needs real binaries.
      - name: Run abicheck compare (verify action infrastructure)
        id: abi
        uses: ./
        with:
          old-library: tests/fixtures/action/action_test_v1.json
          new-library: tests/fixtures/action/action_test_v2.json
          old-version: '1.0'
          new-version: '2.0'
          format: json
          output-file: test-output.json
          policy: strict_abi
          verbose: true
          install-deps: false
          fail-on-breaking: false
          add-job-summary: true

      - name: Verify output file exists and is valid
        shell: bash
        run: |
          test -f test-output.json
          python -m json.tool test-output.json > /dev/null
          echo "Output file is valid JSON"

  # ── Test: check-target (G30 P1.3, ADR-047 §4/§7) ─────────────────────────
  test-check-target:
    name: 'check-target: gate-mode: deferred never fails on a real finding, report envelope is well-formed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Stage a fake baseline-set directly (no actions/baseline run needed --
      # check-target only cares that resolve-baseline can read manifest.json
      # + the snapshot it points at). action_test_v1.json/v2.json is the same
      # pair test-compare-breaking already establishes as a real BREAKING
      # finding -- reused here to prove check-target's own envelope/gate-mode
      # logic on top of a known compatibility result, not to re-test compare
      # itself.
      - name: Stage baseline-set
        shell: bash
        run: |
          mkdir -p /tmp/baseline-set
          cp tests/fixtures/action/action_test_v1.json /tmp/baseline-set/libexample.abicheck.json
          python3 -c "
          import json
          manifest = {
              'manifest_version': 1,
              'project_ref': 'v1.0.0',
              'profile': 'linux-x86_64-gcc-test',
              'snapshot_schema': 9,
              'fact_set': None,
              'artifacts': [
                  {
                      'library': 'libexample',
                      'artifact': 'build/libexample.so',
                      'snapshot': 'libexample.abicheck.json',
                      'sha256': '',
                  }
              ],
          }
          with open('/tmp/baseline-set/manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          "

      - name: 'Run check-target (gate-mode: deferred)'
        id: check
        uses: ./actions/check-target
        with:
          name: libexample
          profile: linux-x86_64-gcc-test
          baseline-channel: accepted-main
          baseline-path: /tmp/baseline-set
          requested-depth: headers
          gate-mode: deferred
          new-library: tests/fixtures/action/action_test_v2.json
          install-deps: false

      - name: "Verify outcome, envelope identity, and gate-mode: deferred's non-failing job"
        shell: bash
        run: |
          echo "outcome=${{ steps.check.outputs.outcome }}"
          echo "check-id=${{ steps.check.outputs.check-id }}"
          echo "verdict=${{ steps.check.outputs.verdict }}"
          echo "compatibility-verdict=${{ steps.check.outputs.compatibility-verdict }}"
          echo "policy-gate-decision=${{ steps.check.outputs.policy-gate-decision }}"
          test "${{ steps.check.outputs.outcome }}" = "resolved"
          test "${{ steps.check.outputs.check-id }}" = "libexample@linux-x86_64-gcc-test#accepted-main@headers"
          test "${{ steps.check.outputs.verdict }}" = "BREAKING"
          test "${{ steps.check.outputs.compatibility-verdict }}" = "BREAKING"
          test "${{ steps.check.outputs.policy-gate-decision }}" = "fail"
          # gate-mode: deferred must not fail this job on a real finding --
          # reaching this step at all (after a nonzero-exit internal compare)
          # already proves that; also assert the persisted report kept its
          # REAL severity (never neutralized for deferred -- only advisory
          # neutralizes, since a trailing aggregate job needs the real value).
          python -m json.tool "${{ steps.check.outputs.report-path }}" > /dev/null
          python3 -c "import json, sys
          report = json.load(open(sys.argv[1]))
          assert report['severity']['exit_code'] == 4, report['severity']
          assert report['operational_errors'] == []
          assert report['check_evidence_coverage']['state'] == 'complete'
          print('report envelope OK')" "${{ steps.check.outputs.report-path }}"

  # ── Test: multiplatform ─────────────────────────────────────────────────
  test-multiplatform:
    name: 'Multiplatform: ${{ matrix.os }}'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Run abicheck
        id: abi
        uses: ./
        with:
          old-library: tests/fixtures/action/action_test_v1.json
          new-library: tests/fixtures/action/action_test_v2.json
          install-deps: false
          fail-on-breaking: false

      - name: Verify verdict
        shell: bash
        run: |
          echo "Verdict on ${{ matrix.os }}: ${{ steps.abi.outputs.verdict }}"
          if [[ "${{ steps.abi.outputs.verdict }}" != "BREAKING" ]]; then
            echo "::error::Expected BREAKING on ${{ matrix.os }}"
            exit 1
          fi

  # ── Test: severity-addition error ─────────────────────────────────────────
  test-severity-addition-error:
    name: 'severity-addition error: detect unexpected API expansion'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run abicheck (compatible additions, should fail with severity)
        id: abi
        uses: ./
        continue-on-error: true
        with:
          old-library: tests/fixtures/action/action_test_v1.json
          new-library: tests/fixtures/action/action_test_v1_with_addition.json
          install-deps: false
          fail-on-breaking: false
          extra-args: '--severity-addition error'

      - name: Verify severity-driven failure
        shell: bash
        run: |
          if [[ "${{ steps.abi.outcome }}" != "failure" ]]; then
            echo "::error::Expected step outcome=failure, got ${{ steps.abi.outcome }}"
            exit 1
          fi
          echo "Verdict: ${{ steps.abi.outputs.verdict }}"
          echo "Exit code: ${{ steps.abi.outputs.exit-code }}"
          if [[ "${{ steps.abi.outputs.verdict }}" != "SEVERITY_ERROR" ]]; then
            echo "::error::Expected verdict SEVERITY_ERROR, got ${{ steps.abi.outputs.verdict }}"
            exit 1
          fi
          if [[ "${{ steps.abi.outputs.exit-code }}" != "1" ]]; then
            echo "::error::Expected exit code 1, got ${{ steps.abi.outputs.exit-code }}"
            exit 1
          fi
          echo "Correctly detected API additions via severity (exit code 1)"

  # ── Test: app-scoped comparison (ADR-043: appcompat folded into --used-by) ──
  test-appcompat-full:
    name: 'Appcompat: detect breaking change affecting app'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build test binaries
        run: |
          cd examples/case01_symbol_removal
          gcc -shared -fPIC v1.c -o libv1.so
          gcc -shared -fPIC v2.c -o libv2.so
          gcc app.c -L. -lv1 -o myapp -Wl,-rpath,.

      - name: Run abicheck compare --used-by (breaking case)
        id: abi
        uses: ./
        continue-on-error: true
        with:
          old-library: examples/case01_symbol_removal/libv1.so
          new-library: examples/case01_symbol_removal/libv2.so
          format: json
          output-file: appcompat-result.json
          install-deps: false
          fail-on-breaking: true
          extra-args: '--used-by examples/case01_symbol_removal/myapp'

      - name: Verify verdict is BREAKING
        shell: bash
        run: |
          echo "Verdict: ${{ steps.abi.outputs.verdict }}"
          echo "Exit code: ${{ steps.abi.outputs.exit-code }}"
          if [[ "${{ steps.abi.outputs.verdict }}" != "BREAKING" ]]; then
            echo "::error::Expected verdict BREAKING, got ${{ steps.abi.outputs.verdict }}"
            exit 1
          fi

  # ── Test: app-scoped comparison against an unchanged library (weak mode) ───
  test-appcompat-weak:
    name: 'Appcompat: weak mode symbol check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build test binaries
        run: |
          cd examples/case01_symbol_removal
          gcc -shared -fPIC v1.c -o libv1.so
          gcc app.c -L. -lv1 -o myapp -Wl,-rpath,.

      - name: Run abicheck compare --used-by (all symbols present)
        id: abi
        uses: ./
        with:
          old-library: examples/case01_symbol_removal/libv1.so
          new-library: examples/case01_symbol_removal/libv1.so
          install-deps: false
          fail-on-breaking: true
          extra-args: '--used-by examples/case01_symbol_removal/myapp'

      - name: Verify verdict is COMPATIBLE
        shell: bash
        run: |
          echo "Verdict: ${{ steps.abi.outputs.verdict }}"
          if [[ "${{ steps.abi.outputs.verdict }}" != "COMPATIBLE" ]]; then
            echo "::error::Expected verdict COMPATIBLE, got ${{ steps.abi.outputs.verdict }}"
            exit 1
          fi

  test-additions-pass-by-default:
    name: 'additions pass through without severity-addition error'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run abicheck (additions allowed by default)
        id: abi
        uses: ./
        with:
          old-library: tests/fixtures/action/action_test_v1.json
          new-library: tests/fixtures/action/action_test_v1_with_addition.json
          install-deps: false
          fail-on-breaking: false

      - name: Verify step succeeded
        shell: bash
        run: |
          if [[ "${{ steps.abi.outcome }}" != "success" ]]; then
            echo "::error::Expected success when additions are at default severity"
            exit 1
          fi
          echo "Correctly passed with additions at default severity (info)"

  # ── Scan mode: source-intelligence orchestrator (snapshot inputs) ──────────
  test-scan-baseline-breaking:
    name: 'Scan: baseline comparison detects breaking change'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run abicheck scan against a baseline
        id: abi
        uses: ./
        with:
          mode: scan
          new-library: tests/fixtures/action/action_test_v2.json
          against: tests/fixtures/action/action_test_v1.json
          install-deps: false
          fail-on-breaking: false  # don't fail the test job

      - name: Verify verdict is BREAKING (exit 4)
        shell: bash
        run: |
          echo "Verdict: ${{ steps.abi.outputs.verdict }}"
          echo "Exit code: ${{ steps.abi.outputs.exit-code }}"
          if [[ "${{ steps.abi.outputs.verdict }}" != "BREAKING" ]]; then
            echo "::error::Expected verdict BREAKING, got ${{ steps.abi.outputs.verdict }}"
            exit 1
          fi
          if [[ "${{ steps.abi.outputs.exit-code }}" != "4" ]]; then
            echo "::error::Expected exit code 4, got ${{ steps.abi.outputs.exit-code }}"
            exit 1
          fi

  test-scan-audit:
    name: 'Scan: single-release audit (no baseline)'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run abicheck scan in audit mode
        id: abi
        uses: ./
        with:
          mode: scan
          new-library: tests/fixtures/action/action_test_v2.json
          audit: 'true'
          install-deps: false

      - name: Verify audit succeeds and is COMPATIBLE
        shell: bash
        run: |
          echo "Verdict: ${{ steps.abi.outputs.verdict }}"
          if [[ "${{ steps.abi.outcome }}" != "success" ]]; then
            echo "::error::Expected the audit step to succeed"
            exit 1
          fi
          if [[ "${{ steps.abi.outputs.verdict }}" != "COMPATIBLE" ]]; then
            echo "::error::Expected verdict COMPATIBLE, got ${{ steps.abi.outputs.verdict }}"
            exit 1
          fi

  test-scan-estimate:
    name: 'Scan: --estimate dry run'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run abicheck scan --estimate
        id: abi
        uses: ./
        with:
          mode: scan
          new-library: tests/fixtures/action/action_test_v2.json
          estimate: 'true'
          install-deps: false

      - name: Verify estimate exits 0
        shell: bash
        run: |
          echo "Verdict: ${{ steps.abi.outputs.verdict }}"
          if [[ "${{ steps.abi.outputs.exit-code }}" != "0" ]]; then
            echo "::error::Expected estimate to exit 0, got ${{ steps.abi.outputs.exit-code }}"
            exit 1
          fi

