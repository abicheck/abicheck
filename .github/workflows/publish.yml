name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, do not publish)"
        required: false
        default: false
        type: boolean

# Deny all permissions by default; jobs declare only what they need.
permissions: {}

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.14"  # consistent with main CI matrix

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Build sdist and wheel
        run: python -m build

      - name: Check dist contents
        run: |
          pip install "twine>=5.1"
          twine check dist/*
          ls -lh dist/

      - name: Smoke-test wheel install
        run: |
          pip install dist/*.whl
          python -c "import abicheck; print('abicheck version:', abicheck.__version__)"

      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: dist
          path: dist/
          retention-days: 7

  benchmark:
    name: Release-pinned benchmark
    # Run only for real releases; generates a reproducible benchmark report
    # (versions, git commit, ground-truth digest, per-tool accuracy) as a
    # read-only artifact so the README accuracy numbers are auditable evidence.
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Install system deps (oracles + toolchain)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc g++ cmake curl ca-certificates
          sudo apt-get install -y abigail-tools || sudo apt-get install -y libabigail-tools
          sudo apt-get install -y abi-compliance-checker || true

      - name: Set up pinned CastXML
        run: bash action/install-castxml.sh

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.14"
          cache: 'pip'

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run benchmark
        run: python scripts/benchmark_comparison.py --suite pinned74 --abicc-timeout 60

      - name: Upload benchmark report (workflow artifact)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: benchmark-report
          path: benchmark_reports/benchmark_report.json
          retention-days: 90


  upload-benchmark-report:
    name: Attach benchmark report to release
    needs: benchmark
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download benchmark report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: benchmark-report
          path: benchmark_reports/

      - name: Attach benchmark report to the release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: benchmark_reports/benchmark_report.json

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Publish on Release event OR manual dispatch without dry_run flag
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
    environment:
      name: pypi
      url: https://pypi.org/project/abicheck/
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        # Uses Trusted Publishing (OIDC) — no API token needed.
        # Configure at: https://pypi.org/manage/project/abicheck/settings/publishing/
        # Pinned to a commit SHA (not the mutable `release/v1` branch it
        # tracks) — this job has `id-token: write` for OIDC, so a re-pointed
        # branch ref here would be a real supply-chain risk (AGENTS.md
        # "Known gaps" — Action pinning).
