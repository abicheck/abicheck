name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ai-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Install mypy (for baseline-drift check)
        run: |
          python -m pip install --upgrade pip
          pip install "mypy==1.19.1"  # pin so the drift gate is reproducible (field-eval CI gap)
      - name: AI-readiness checks (file size, CLAUDE.md coverage, ChangeKind invariants, mypy drift, import cycles)
        run: python scripts/verify.py --profile pr --only ai-readiness
      - name: Install package (for FP-rate / tier-accuracy / doc-sync gates)
        run: pip install -e .
      # Scoping FP-rate gate (ADR-024 §7), per-tier accuracy gate, and the
      # use-case docs sync gate — routed through scripts/verify.py, the same
      # implementation `pixi run check` and `python scripts/verify.py
      # --profile pr` run locally (CLAUDE.md "M0-3"), so this job can't
      # silently diverge from the local PR-profile definition of done.
      - name: Scoping / tier-accuracy / doc-sync gates
        run: python scripts/verify.py --profile pr --only fp-rate,tier-accuracy,usecase-docs-sync
      - name: Per-tier accuracy matrix (step-summary artifact)
        if: always()
        run: python scripts/check_tier_accuracy.py --markdown >> "$GITHUB_STEP_SUMMARY"

  fair-metadata:
    name: FAIR metadata and packaging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Install validation and build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" build twine
      - name: Verify FAIR metadata and published schema copies
        run: python scripts/verify.py --profile pr --only schema-sync,fair-metadata
      - name: Build distribution artifacts
        run: python -m build
      - name: Validate distribution metadata
        run: |
          twine check dist/*
          python scripts/verify.py --profile full --only distribution-build
          python scripts/check_distribution_metadata.py

  lint-and-types:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]"  # mypy is pinned in [dev]; no separate unpinned install
      - name: Install docs dependencies
        run: pip install mkdocs mkdocs-material pymdown-extensions mkdocs-redirects
      # lint / typecheck / docs-build routed through scripts/verify.py — see
      # the ai-readiness job's comment above (CLAUDE.md "M0-3").
      - name: Lint, type check, docs build (strict)
        run: python scripts/verify.py --profile pr --only lint,typecheck,docs-build

  unit-tests:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    env:
      # Use the sys.monitoring coverage backend (Python 3.12+): far lower
      # instrumentation overhead than the default C-trace core, with the same
      # line+branch data. Every matrix Python here is 3.12+, so it's always
      # available. Harmless on steps that don't collect coverage.
      COVERAGE_CORE: sysmon
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.12', '3.13', '3.14']
        allow-prereleases: [false]
        include:
          - os: windows-latest
            python-version: '3.13'
            allow-prereleases: false
          - os: macos-latest
            python-version: '3.13'
            allow-prereleases: false
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: ${{ matrix.allow-prereleases }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]"
      - name: Run tests with coverage (Linux 3.13 — canonical lane, enforces 95% floor)
        # Coverage + the 95% floor + the codecov upload run on ONE canonical
        # Linux/Python lane (3.13). The other Linux Pythons (3.12/3.14) run the
        # same suite *without* coverage instrumentation — they'd only re-check
        # the identical floor, and coverage adds ~60% wall time. macOS/Windows
        # skip the Linux-only ELF/DWARF tests, so they don't enforce the floor.
        # --durations=25 surfaces the slowest tests in the CI log every run so
        # timing regressions stay visible (test-time hygiene).
        if: runner.os == 'Linux' && matrix.python-version == '3.13'
        env:
          # Capture per-test durations (tests/conftest.py hook) for the
          # test-time report + artifact below.
          ABICHECK_DURATIONS_JSON: test-durations.json
        run: |
          pytest tests/ -v --tb=short -m "not integration and not libabigail and not abicc and not slow" -n auto --dist worksteal --durations=25 --cov=abicheck --cov-report=term-missing --cov-report=xml --cov-fail-under=95
      - name: Run tests (Linux non-canonical Python — no coverage)
        if: runner.os == 'Linux' && matrix.python-version != '3.13'
        run: |
          pytest tests/ -v --tb=short -m "not integration and not libabigail and not abicc and not slow" -n auto --dist worksteal --durations=25
      - name: Run tests with coverage (macOS — report only, platform tests skip)
        if: runner.os == 'macOS'
        run: |
          pytest tests/ -v --tb=short -m "not integration and not libabigail and not abicc and not slow" -n auto --dist worksteal --durations=25 --cov=abicheck --cov-report=term-missing --cov-report=xml
      - name: Run tests (Windows — parallel, no coverage)
        if: runner.os == 'Windows'
        run: |
          pytest tests/ -v --tb=short -m "not integration and not libabigail and not abicc and not slow" -n auto --dist worksteal --durations=25
      - name: Run slow tests (hypothesis / property-based)
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        run: |
          pytest tests/ -v --tb=short -m "slow" --cov=abicheck --cov-report=xml:coverage-slow.xml --cov-append
      - name: Test-time report (slowest tests → run summary)
        # Renders the captured durations into the GitHub run summary. Reporting
        # only — a hard per-test wall-time gate would be flaky given CI-runner
        # variance; the uploaded artifact is the durable record for trends.
        # continue-on-error keeps it truly non-blocking: a hiccup rendering the
        # report must never fail an otherwise-green test job.
        if: always() && matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        continue-on-error: true
        run: python scripts/summarize_test_durations.py test-durations.json --top 25
      - name: Upload test-durations artifact
        if: always() && matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: test-durations
          path: test-durations.json
          if-no-files-found: ignore
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v7
        with:
          use_oidc: true
          files: coverage.xml
          flags: unit
          fail_ci_if_error: false

  integration-tests:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          # Don't let a flaky pre-baked third-party apt repo (e.g. the runner's
          # packages.microsoft.com returning 403/"no longer signed") fail the lane:
          # tolerate `update` errors — the `install` below still fails loudly if any
          # of the packages it needs are genuinely unavailable.
          sudo apt-get update -qq || sudo apt-get update -qq || true
          sudo apt-get install -y castxml gcc g++ cmake clang
      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install castxml cmake
      - name: Install system deps (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake --no-progress --yes
          pip install castxml
      - name: Set up MSVC developer environment (cl.exe on PATH)
        # Some example cases build via CMake (CMakeLists.txt special flags),
        # which invokes CMake's own compiler sanity check
        # (CMakeTestCCompiler.cmake) against cl.exe. Without vcvarsall having
        # run, cl.exe can't find the MSVC/Windows SDK headers even for a
        # trivial program ("is not able to compile a simple test program").
        # windows-msvc job below hits the same class of issue and fixes it
        # the same way.
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run integration tests (Linux/macOS — with coverage)
        if: runner.os != 'Windows'
        # ABICHECK_MIN_EXECUTED guards against a silent toolchain-install failure
        # turning the whole lane into 0-ran-but-green (see tests/conftest.py).
        # Linux's ELF integration count is known (~195) so it gets a real floor;
        # the macOS Mach-O subset count isn't verified here, so it uses a minimal
        # "> 0" floor — enough to catch a missing toolchain without risking a
        # false failure from platform subsetting.
        env:
          ABICHECK_MIN_EXECUTED: ${{ runner.os == 'macOS' && '1' || '20' }}
        run: |
          pytest tests/ -v -m integration --tb=short --cov=abicheck --cov-report=xml:coverage-integration.xml --ignore=tests/test_abi_examples.py
      - name: Run integration tests (Windows — parallel, no coverage)
        if: runner.os == 'Windows'
        # Same silent-skip guard: the xdist controller aggregates every worker's
        # reports, so the session-finish check in conftest.py works under -n auto
        # (verified). The Windows PE integration count isn't measured here, so a
        # minimal "> 0" floor catches a missing MinGW without false failures.
        env:
          ABICHECK_MIN_EXECUTED: '1'
        run: |
          pytest tests/ -v -m integration --tb=short -n auto --dist worksteal --ignore=tests/test_abi_examples.py
      - name: Upload integration coverage to Codecov
        if: always() && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v7
        with:
          use_oidc: true
          files: coverage-integration.xml
          flags: integration
          fail_ci_if_error: false

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y castxml zlib1g-dev
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Install package
        run: pip install -e ".[dev]"
      - name: End-to-end demo (libz)
        run: python scripts/demo_libz.py

  windows-msvc:
    name: MSVC + PDB end-to-end
    runs-on: windows-latest
    timeout-minutes: 20
    # Experimental lane: abicheck's pure-Python PDB parser is still maturing on
    # real MSVC output, so a failure here is informational (does not block the
    # PR). Tests self-skip when layout cannot be extracted; this flag covers
    # genuine parser/toolchain breakage until the lane is proven stable.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Set up MSVC developer environment (cl.exe on PATH)
        uses: ilammy/msvc-dev-cmd@v1
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run MSVC + PDB end-to-end tests
        run: pytest tests/test_msvc_pdb_e2e.py -v -m msvc --tb=short

  cross-platform-e2e:
    # G1: native PE/Mach-O `compare` workflows + AArch64 AAPCS modeling.
    # Drives `abicheck compare` over binaries built by the *platform's own*
    # toolchain (Apple clang → .dylib, MinGW gcc → .dll) and asserts verdicts,
    # so the core workflow is validated end-to-end off the Linux baseline.
    #
    # Kept always-on (not path-gated): the jobs are short (~1 min) and a
    # path-filtered "skipped" status complicates branch-protection required
    # checks; the modest runner cost buys a reliable platform signal on every PR.
    name: Native PE/Mach-O compare workflows
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Install MinGW gcc (Windows — PE/DWARF)
        if: runner.os == 'Windows'
        run: choco install mingw --no-progress --yes
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Native PE/Mach-O compare workflow tests
        # Run ONLY the native, compiler-gated integration tests here. Every test
        # in this file is @pytest.mark.integration and needs clang/MinGW, so if
        # the native compiler is missing they all skip and the
        # ABICHECK_MIN_EXECUTED floor fails the lane — closing the silent-skip
        # hole where always-run unit tests could keep it green. (The AArch64
        # AAPCS64 unit tests run in the regular unit-tests lane on all OSes.)
        # Floor 5: each platform contributes ~7-8 native tests when the compiler
        # is present, so 5 is comfortably reachable yet 0 (all-skipped) fails.
        env:
          ABICHECK_MIN_EXECUTED: '5'
        run: pytest tests/test_cross_platform_integration.py -v -m integration --tb=short

  heavy-parity-gate:
    runs-on: ubuntu-latest
    outputs:
      run-heavy: ${{ steps.resolve.outputs.run-heavy }}
      reason: ${{ steps.resolve.outputs.reason }}
    steps:
      - uses: actions/checkout@v6

      - name: Detect changed files for parity jobs (PR only)
        id: changed
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v4
        with:
          filters: |
            heavy:
              - 'abicheck/**'
              - 'tests/**'
              - 'examples/**'
              - '.github/workflows/**'

      - name: Resolve parity gate output
        id: resolve
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run-heavy=true" >> "$GITHUB_OUTPUT"
            echo "reason=full-run-non-pr-event" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.changed.outputs.heavy }}" = "true" ]; then
            echo "run-heavy=true" >> "$GITHUB_OUTPUT"
            echo "reason=relevant-files-changed" >> "$GITHUB_OUTPUT"
          else
            echo "run-heavy=false" >> "$GITHUB_OUTPUT"
            echo "reason=no-relevant-changes" >> "$GITHUB_OUTPUT"
          fi

  libabigail-parity:
    needs: [heavy-parity-gate]
    if: needs.heavy-parity-gate.outputs.run-heavy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc g++ castxml
          sudo apt-get install -y abigail-tools || sudo apt-get install -y libabigail-tools
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run libabigail parity tests
        # Fail loudly if abigail-tools didn't install (lane would otherwise skip
        # every test and pass) — see tests/conftest.py silent-skip guard.
        env:
          ABICHECK_MIN_EXECUTED: '5'
        run: pytest tests/test_abidiff_parity.py tests/test_abicompat_parity.py tests/test_abipkgdiff_parity.py -v -m libabigail --tb=short

  abicc-parity:
    needs: [heavy-parity-gate]
    if: needs.heavy-parity-gate.outputs.run-heavy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc g++ castxml abi-compliance-checker
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run ABICC parity tests
        # Fail loudly if abi-compliance-checker didn't install (lane would
        # otherwise skip every test and pass) — see tests/conftest.py guard.
        env:
          ABICHECK_MIN_EXECUTED: '10'
        run: pytest tests/test_abicc_parity.py tests/test_xml_parity.py -v -m abicc --tb=short
      - name: Run XML schema validation tests (no ABICC required)
        run: pytest tests/test_xml_parity.py::TestXmlSchemaValidation tests/test_xml_report.py -v --tb=short

  packaging:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - name: Build artifacts and validate metadata
        run: |
          python -m pip install --upgrade pip
          pip install build twine
          python -m build
          twine check dist/*
