name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install MkDocs + Material theme
        run: pip install mkdocs mkdocs-material mkdocs-redirects

      - name: Regenerate published documentation assets (idempotent)
        run: |
          python scripts/gen_examples_docs.py
          python scripts/publish_schemas.py

      - name: Build site
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment

  verify-schema-ids:
    name: Verify published schema IDs
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Retrieve every canonical schema URL
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' > schema_urls.txt
          import json
          from pathlib import Path
          for path in sorted(Path("abicheck/schemas").glob("*.schema.json")):
              print(json.loads(path.read_text(encoding="utf-8"))["$id"])
          PY
          while IFS= read -r url; do
            echo "Checking $url"
            curl --fail --location --retry 5 --retry-all-errors --retry-delay 3 --connect-timeout 15 "$url" -o /dev/null
          done < schema_urls.txt
