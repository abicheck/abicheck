name: 'abicheck — ABI Compatibility Checker'
description: 'Detect ABI/API and dependency breakages across C/C++ binaries, packages, and releases in CI.'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  # ── Operation mode ──────────────────────────────────────────────────────────
  mode:
    description: >
      Operation mode, mirroring abicheck's 5-command CLI surface (ADR-043):
      "compare" (default) compares two ABI surfaces — old-library/new-library
      may be single binaries/snapshots OR directories/packages, in which case
      abicheck fans out to a per-library comparison automatically (no separate
      mode); "dump" generates a JSON baseline snapshot from a single library
      (now also embeds optional L3/L4/L5 build-source evidence via
      source/build inputs); "scan" runs the deterministic source-intelligence
      orchestrator (classify → always-on pattern/cross-source tier → pinned
      evidence level, optionally compared against a baseline) — the entry
      point for source scans; "deps-tree" resolves transitive dependencies
      and symbol bindings for one binary (Linux ELF); "deps-compare" compares
      a binary's full dependency stack across two sysroots (Linux ELF).
    required: false
    default: 'compare'

  # ── Library inputs ──────────────────────────────────────────────────────────
  old-library:
    description: >
      Path to the old library, JSON snapshot, or ABICC Perl dump. Required
      when mode=compare. May also be a directory or package (RPM, Deb, tar,
      conda, wheel) — abicheck then fans out to a per-library comparison
      automatically.
    required: false
  new-library:
    description: >
      Path to the new (current) library, binary, or JSON snapshot. Required
      for compare, dump (unless a source-only sources/build-info/compile-db
      input is given), scan, and deps-tree/deps-compare modes. May be a
      directory or package (RPM, Deb, tar, conda, wheel) ONLY in compare
      mode, matching old-library — compare then fans out to a per-library
      comparison automatically. dump and scan each analyse exactly one
      artifact and reject a directory/package with an error (they have no
      per-library fan-out); for a multi-library release, dump/scan each
      library individually or use compare instead.
    required: false

  # ── Package inputs (compare mode, directory/package operands only) ──────────
  debug-info1:
    description: 'Debug info package for old side (RPM/Deb/tar). compare mode, directory/package operands only.'
    required: false
  debug-info2:
    description: 'Debug info package for new side (RPM/Deb/tar). compare mode, directory/package operands only.'
    required: false
  devel-pkg1:
    description: 'Development package with headers for old side. compare mode, directory/package operands only.'
    required: false
  devel-pkg2:
    description: 'Development package with headers for new side. compare mode, directory/package operands only.'
    required: false
  dso-only:
    description: 'Only compare shared objects, skip executables. compare mode, directory/package operands only.'
    required: false
    default: 'false'
  include-private-dso:
    description: 'Include private (non-public) shared objects from non-standard paths. compare mode, directory/package operands only.'
    required: false
    default: 'false'
  keep-extracted:
    description: 'Keep extracted temporary files for debugging. compare mode, directory/package operands only.'
    required: false
    default: 'false'
  fail-on-removed-library:
    description: 'Exit 8 when a library present in old is absent in new. compare mode, directory/package operands only.'
    required: false
    default: 'false'

  # ── Header inputs ───────────────────────────────────────────────────────────
  header:
    description: >
      Public header file(s) applied to both sides (space-separated).
      Required when input is an ELF binary; ignored for JSON snapshots.
    required: false
  old-header:
    description: 'Public header(s) for the old side only (overrides header for old). Space-separated.'
    required: false
  new-header:
    description: 'Public header(s) for the new side only (overrides header for new). Space-separated.'
    required: false

  # ── Include directories ─────────────────────────────────────────────────────
  include:
    description: 'Extra include directories for castxml, applied to both sides. Space-separated.'
    required: false
  old-include:
    description: 'Include directories for old side only. Space-separated.'
    required: false
  new-include:
    description: 'Include directories for new side only. Space-separated.'
    required: false

  # ── Version labels ──────────────────────────────────────────────────────────
  old-version:
    description: 'Version label for the old library (embedded in reports).'
    required: false
    default: 'old'
  new-version:
    description: 'Version label for the new library (embedded in reports).'
    required: false
    default: 'new'

  # ── Language & compiler ─────────────────────────────────────────────────────
  lang:
    description: 'Language mode for header AST parsing: "c++" or "c".'
    required: false
    default: 'c++'
  ast-frontend:
    description: >
      L2 header-AST frontend for native-binary inputs: "auto" (resolves to
      castxml without conditional clang fallback; a runtime castxml
      toolchain-version failure still falls back to clang, G16), "castxml"
      (default), "clang" (clang -ast-dump=json; explicit opt-in for
      clang-only hosts), or "hybrid" (runs both and merges them; needs both
      tools installed on the runner, never auto-selected). Applies to dump,
      compare, and scan modes (shared `compile_context_options`, ADR-037 D3).
      Same as the ABICHECK_AST_FRONTEND env var.
    required: false
  gcc-path:
    description: >
      Path to GCC/G++ (or clang) cross-compiler binary. Applies to dump,
      compare, and scan modes.
    required: false
  gcc-prefix:
    description: >
      Cross-toolchain prefix, e.g. aarch64-linux-gnu-. Applies to dump,
      compare, and scan modes.
    required: false
  gcc-options:
    description: >
      Extra compiler flags passed through to the header frontend. Applies to
      dump, compare, and scan modes.
    required: false
  sysroot:
    description: 'Alternative system root directory for cross-compilation. Applies to dump, compare, scan, and deps-tree modes.'
    required: false
  nostdinc:
    description: >
      Do not search standard system include paths. Applies to dump, compare,
      and scan modes.
    required: false
    default: 'false'

  # ── Full-stack dependency validation (Linux ELF) ─────────────────────────────
  follow-deps:
    description: >
      Include transitive dependency graph and symbol binding info in dump or
      compare output. ELF only. Applies to dump and compare modes.
    required: false
    default: 'false'
  old-root:
    description: >
      Sysroot for the old (baseline) environment. Required for
      mode=deps-compare.
    required: false
  new-root:
    description: >
      Sysroot for the new (candidate) environment. Required for
      mode=deps-compare.
    required: false
  search-path:
    description: >
      Additional directories to search for shared libraries (space-separated).
      Used by deps-tree, deps-compare, and follow-deps.
    required: false
  ld-library-path:
    description: >
      Simulated LD_LIBRARY_PATH (colon-separated). Used by deps-tree,
      deps-compare, and follow-deps.
    required: false

  # ── Scoped comparison: app-usage / required-symbol contracts (compare mode) ──
  used-by:
    description: >
      Application binary/binaries whose actual imports/required symbol
      versions scope the comparison (space-separated; maps to repeated
      compare --used-by). The full library comparison still runs; the
      worst app-scoped result becomes the primary verdict/exit code, with
      the full verdict kept as informational context. Mutually exclusive
      with required-symbol/required-symbols (the CLI rejects both being
      set). compare mode only.
    required: false
  verify-runtime:
    description: >
      With used-by: actually run each consumer binary once against the old
      library and once against the new one (LD_BIND_NOW=1), recording a
      runtime-load-failure finding when the dynamic linker reports an
      undefined symbol against the new library after loading cleanly
      against the old one. Linux-only; a no-op elsewhere. Ignored without
      used-by. compare mode only.
    required: false
    default: 'false'
  required-symbol:
    description: >
      An exported linker symbol a plugin host resolves via dlopen/dlsym
      and requires (space-separated; maps to repeated compare
      --required-symbol). Scopes the comparison to this explicit
      entrypoint contract instead of the full diff. Mutually exclusive
      with used-by. compare mode only.
    required: false
  required-symbols:
    description: >
      Path to a file of required symbols, one per line (blank lines and
      '#' comments ignored) -- combined with any required-symbol values.
      compare mode only.
    required: false

  # ── Source-scan & build-source evidence (scan / dump modes) ──────────────────
  against:
    description: >
      scan mode only. Baseline artifact (a library binary or JSON snapshot) to
      compare the scanned new-library against. Maps to scan --against; omit
      for a one-build audit (see the audit input below). Overridden by
      abi-baseline when set.
    required: false
  sources:
    description: >
      Source checkout / tree for source-intelligence analysis. The compile
      database is auto-discovered within it. Drives L4 source-ABI replay and
      L5 source-graph collection. Used by scan and dump modes, and by compare
      mode for the new (candidate) side only — mapped to compare's
      --sources new=... (the old side's evidence, if any, is expected to
      already be embedded in whatever old-library snapshot was resolved).
    required: false
  build-info:
    description: >
      Out-of-tree L3 build context: a build directory, a compile_commands.json,
      or a previously-collected evidence pack. Use when the build tree lives
      outside --sources. Used by scan and dump modes, and by compare mode for
      the new (candidate) side only — mapped to compare's
      --build-info new=... (same old-side caveat as sources above).
    required: false
  compile-db:
    description: >
      Explicit path to a compile_commands.json (scan mode; also compare
      mode's new side when build-info is unset). For dump mode this is
      folded into build-info. Use when the compile DB is not under sources.
    required: false
  build-config:
    description: >
      Path to a trusted .abicheck.yml. Supplying this alone (not
      allow-build-query) is what permits its build.query (compile-DB
      generation) command to run — see allow-build-query below. Used by scan
      and dump modes, and by compare mode (--config).
    required: false
  allow-build-query:
    description: >
      Deprecated no-op, kept only for backward compatibility — it neither
      grants nor restricts running build-config's build.query command
      (build-config alone does, per its own description above). abicheck also
      always runs its own inferred, abicheck-authored cmake/bazel/make compile-DB
      query whenever a sources input needs build context, independent of this
      input: pointing abicheck at a source tree is itself the request to
      analyse it. Used by scan and dump modes.
    required: false
    default: 'false'
  depth:
    description: >
      Evidence-depth selector: binary, headers, build, or source. Used by
      scan and dump modes, and by compare mode (--depth). In scan mode, omit
      it for 'auto' (risk-driven); --depth source analyses the whole current
      library target unless since/changed-path seeds a narrower changed
      scope. Maps to --depth. (The deprecated scan-mode/source-method inputs
      have been removed; use depth.)
    required: false
  since:
    description: >
      scan mode only. Focus the scan on files changed vs a git ref
      (e.g. origin/main). Maps to scan --since.
    required: false
  changed-path:
    description: >
      scan mode only. Changed path(s) to focus the scan on (space-separated;
      alternative to since). Maps to repeated scan --changed-path.
    required: false
  budget:
    description: >
      scan mode only. Time guard (e.g. 15m, 900s, 1h). The step FAILS on
      overflow (exit 5) — a budget never silently shrinks scope.
      Maps to scan --budget.
    required: false
  dry-run:
    description: >
      Resolve inputs/config and print what the run would do, without
      performing any analysis or writing output (always exits 0). Maps to
      --dry-run; supported by every mode (compare, dump, scan, deps-tree,
      deps-compare). For scan, this also reports the projected per-layer
      cost (the same preview the deprecated estimate input below used to
      provide). To force a scan-mode single-build hygiene lint instead of a
      baseline compare, simply omit against/abi-baseline for that step —
      scan already runs audit-only whenever no against is given (the
      deprecated audit input below is a functional alias for this).
    required: false
    default: 'false'
  estimate:
    description: >
      Deprecated alias for dry-run (scan mode only, historical name).
      Setting this to true is equivalent to dry-run: 'true'. Prefer dry-run
      directly, which now applies to every mode, not just scan. Kept as a
      functional (not just accepted-and-ignored) alias for backward
      compatibility with existing workflows.
    required: false
    default: 'false'
  audit:
    description: >
      Deprecated. scan mode only. Forces a one-build audit-only run (omits
      --against) even when against/abi-baseline is configured elsewhere in
      the workflow. Prefer simply omitting against/abi-baseline for the
      step instead — scan already runs audit-only whenever no against is
      given. Kept as a functional (not just accepted-and-ignored) alias for
      backward compatibility with existing workflows.
    required: false
    default: 'false'
  crosscheck:
    description: >
      scan mode only. Per-check severity overrides KEY=LEVEL
      (off|info|warning|error), space-separated. Maps to repeated
      scan --crosscheck. Promote a check to =error to gate CI on it.
    required: false
  risk-rules:
    description: >
      scan mode only. Path to a YAML file overriding the risk_rules profile.
      Maps to scan --risk-rules.
    required: false

  # ── Baseline auto-fetch (compare / scan modes) ───────────────────────────────
  abi-baseline:
    description: >
      Automatically fetch an ABI baseline snapshot for compare mode (used as
      old-library) or scan mode (used as the scan baseline).
      Values: "latest-release" fetches *.abicheck.json from the latest GitHub Release;
      a tag name (e.g. "v2.0.0") fetches from that release; a file path uses the
      file directly. Requires GITHUB_TOKEN with contents:read permission.
      Overrides old-library (compare) / against (scan) when set.
    required: false

  # ── Output & policy ─────────────────────────────────────────────────────────
  format:
    description: >
      Output format: json, sarif, html, or markdown/text (each mode's
      default when this input is left unset — markdown for compare/
      deps-tree/deps-compare, text for scan). sarif is only supported in
      compare mode with a single-pair (non-directory, non-package) operand
      — a directory/package compare rejects it with an error. html is
      supported by compare (same single-pair restriction as sarif) and by
      deps-tree/deps-compare (a dependency-stack report). scan supports
      text (its default) and json only. dump ignores this input; it always
      writes a JSON snapshot. Requesting an
      unsupported format for the mode is a hard error raised before any
      dependency install (it used to silently fall back to a supported
      format with only a warning, which is unsafe for CI — see
      upload-sarif). Deliberately has no Action-level default (unlike most
      inputs): a single default here would resolve to the wrong value for
      scan regardless of mode, since GitHub Actions has no way to tell
      "left unset" from "explicitly set to the default" apart once a
      default is declared — each mode branch in action/run.sh supplies its
      own correct default instead.
    required: false
  output-file:
    description: 'Path to write the report file. If not set, output goes to stdout and job summary.'
    required: false
  policy:
    description: 'Built-in policy profile: strict_abi (default), sdk_vendor, plugin_abi.'
    required: false
    default: 'strict_abi'
  policy-file:
    description: 'Path to a YAML policy file with per-kind verdict overrides.'
    required: false
  suppress:
    description: 'Path to a YAML suppression file to filter known/intentional changes.'
    required: false
  verbose:
    description: 'Enable verbose/debug output from abicheck.'
    required: false
    default: 'false'

  # ── Action-specific behaviour ───────────────────────────────────────────────
  python-version:
    description: 'Python version for setup-python.'
    required: false
    default: '3.13'
  install-deps:
    description: 'Install system dependencies (castxml, gcc). Set to false if pre-installed.'
    required: false
    default: 'true'
  upload-sarif:
    description: >
      Upload SARIF results to GitHub Code Scanning (requires security-events: write permission).
      Requires format=sarif and mode=compare — setting this with any other
      mode or format is a hard error raised before any dependency install
      (mode=scan/dump/deps-tree/deps-compare never produce a SARIF report).
    required: false
    default: 'false'
  fail-on-breaking:
    description: 'Fail the step when a binary ABI break is detected (exit code 4).'
    required: false
    default: 'true'
  fail-on-api-break:
    description: 'Fail the step when a source-level API break is detected (exit code 2).'
    required: false
    default: 'false'
  severity-preset:
    description: >
      Severity preset: 'default', 'strict', or 'info-only'.
      Controls exit codes and report labels. Only applies to compare mode.
    required: false
  severity-addition:
    description: >
      Severity for new public API additions: 'error', 'warning', or 'info'.
      Set to 'error' to fail the step when additions are detected.
      Only applies to compare mode.
    required: false
  jobs:
    description: >
      Number of parallel library comparisons for compare mode when
      old-library/new-library are directories or packages. 0 = auto-detect
      (CPU count). Default: 0.
    required: false
    default: '0'
  extra-args:
    description: 'Additional CLI arguments passed directly to the abicheck command.'
    required: false
    default: ''
  add-job-summary:
    description: 'Write a markdown summary to the GitHub Actions Job Summary. Ignored for dump mode.'
    required: false
    default: 'true'
  pr-comment:
    description: >
      Post a sticky ABI report comment on the pull request (compare mode,
      including directory/package operands). The comment is a content channel
      and never changes the check's red/green state — breaks still gate via
      fail-on-breaking / fail-on-api-break. Defaults to 'true', but is a no-op
      unless the workflow is triggered by a pull_request event and a token with
      'pull-requests: write' is available.
    required: false
    default: 'true'
  pr-comment-mode:
    description: >
      'update' (default) keeps a single sticky comment and edits it in place on
      every run; 'new' posts a fresh comment each run. Either way the scanned
      head SHA is shown in the comment.
    required: false
    default: 'update'
  pr-comment-on:
    description: >
      When to comment: 'changes' (default) only comments when there is at least
      one ABI/API change, 'always' comments every run (including a clean
      "no changes" result), 'never' disables the comment.
    required: false
    default: 'changes'
  pr-comment-detail:
    description: >
      Detail level of the comment body: 'summary' (verdict + counts only),
      'standard' (default; per-symbol tables for breaking/review, grouped safe
      list) or 'full' (every change with locations, all sections expanded).
    required: false
    default: 'standard'
  github-token:
    description: >
      Token used to post the PR comment and to auto-fetch release baselines.
      Defaults to the workflow token; requires 'pull-requests: write' for the
      comment.
    required: false
    default: ${{ github.token }}

outputs:
  verdict:
    description: >
      ABI verdict. For compare (single-pair or directory/package operands):
      COMPATIBLE, SEVERITY_ERROR (with --severity-* via extra-args, or when
      --severity-addition=error detects new public API additions),
      API_BREAK, BREAKING, REMOVED_LIBRARY (directory/package operands with
      fail-on-removed-library set), or ERROR.
      For dump: COMPATIBLE or ERROR.
      For scan: COMPATIBLE, API_BREAK, BREAKING, BUDGET_OVERFLOW, or ERROR.
      For deps-compare: PASS, WARN, FAIL, or ERROR.
      For deps-tree: PASS, FAIL, or ERROR.
    value: ${{ steps.run-abicheck.outputs.verdict }}
  exit-code:
    description: >
      abicheck exit code. compare: 0 (compatible), 1 (severity error),
      2 (API break), 4 (ABI break), 8 (library removed; directory/package
      operands with fail-on-removed-library set).
      scan: 0 (compatible/advisory), 2 (API break), 4 (ABI break),
      5 (budget overflow). deps-compare: 0 (pass), 1 (warn),
      4 (fail). deps-tree: 0 (ok), 1 (missing). Click CLI errors are mapped to
      VERDICT=ERROR.
    value: ${{ steps.run-abicheck.outputs.exit-code }}
  report-path:
    description: >
      Path to the generated report file. Set when output-file is provided,
      or auto-populated for SARIF format (defaults to abicheck-results.sarif).
    value: ${{ steps.run-abicheck.outputs.report-path }}

runs:
  using: 'composite'
  steps:
    # ── 0. Validate mode/input combinations ──────────────────────────────────
    # Fails fast on an unsupported mode/input combination (e.g. a directory
    # passed to dump/scan, or format: sarif on a non-compare mode) before
    # Python setup, system-dependency installation, or any build/analysis
    # work runs — see action/validate-inputs.sh for the rationale. It also
    # warns (not fails) when a mode-scoped input is set on a mode it has no
    # effect on — a legal-but-inert combination, not an error.
    - name: Validate mode/input combination
      shell: bash
      env:
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_NEW_LIBRARY: ${{ inputs.new-library }}
        INPUT_OLD_LIBRARY: ${{ inputs.old-library }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_UPLOAD_SARIF: ${{ inputs.upload-sarif }}
        INPUT_DEBUG_INFO1: ${{ inputs.debug-info1 }}
        INPUT_DEBUG_INFO2: ${{ inputs.debug-info2 }}
        INPUT_DEVEL_PKG1: ${{ inputs.devel-pkg1 }}
        INPUT_DEVEL_PKG2: ${{ inputs.devel-pkg2 }}
        INPUT_DSO_ONLY: ${{ inputs.dso-only }}
        INPUT_INCLUDE_PRIVATE_DSO: ${{ inputs.include-private-dso }}
        INPUT_KEEP_EXTRACTED: ${{ inputs.keep-extracted }}
        INPUT_FAIL_ON_REMOVED_LIBRARY: ${{ inputs.fail-on-removed-library }}
        INPUT_JOBS: ${{ inputs.jobs }}
        INPUT_ABI_BASELINE: ${{ inputs.abi-baseline }}
        INPUT_ESTIMATE: ${{ inputs.estimate }}
        INPUT_AUDIT: ${{ inputs.audit }}
        INPUT_USED_BY: ${{ inputs.used-by }}
        INPUT_VERIFY_RUNTIME: ${{ inputs.verify-runtime }}
        INPUT_REQUIRED_SYMBOL: ${{ inputs.required-symbol }}
        INPUT_REQUIRED_SYMBOLS: ${{ inputs.required-symbols }}
      run: bash "${{ github.action_path }}/action/validate-inputs.sh"

    # ── 1. Python ─────────────────────────────────────────────────────────────
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    # ── 2. System dependencies ────────────────────────────────────────────────
    - name: Install system dependencies
      if: inputs.install-deps == 'true'
      shell: bash
      run: bash "${{ github.action_path }}/action/install-deps.sh"

    # ── 3. Install abicheck ──────────────────────────────────────────────────
    - name: Install abicheck
      shell: bash
      run: pip install "${{ github.action_path }}"

    # ── 4. Run abicheck ──────────────────────────────────────────────────────
    - name: Run abicheck
      id: run-abicheck
      shell: bash
      env:
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_OLD_LIBRARY: ${{ inputs.old-library }}
        INPUT_NEW_LIBRARY: ${{ inputs.new-library }}
        INPUT_HEADER: ${{ inputs.header }}
        INPUT_OLD_HEADER: ${{ inputs.old-header }}
        INPUT_NEW_HEADER: ${{ inputs.new-header }}
        INPUT_INCLUDE: ${{ inputs.include }}
        INPUT_OLD_INCLUDE: ${{ inputs.old-include }}
        INPUT_NEW_INCLUDE: ${{ inputs.new-include }}
        INPUT_OLD_VERSION: ${{ inputs.old-version }}
        INPUT_NEW_VERSION: ${{ inputs.new-version }}
        INPUT_LANG: ${{ inputs.lang }}
        INPUT_AST_FRONTEND: ${{ inputs.ast-frontend }}
        INPUT_GCC_PATH: ${{ inputs.gcc-path }}
        INPUT_GCC_PREFIX: ${{ inputs.gcc-prefix }}
        INPUT_GCC_OPTIONS: ${{ inputs.gcc-options }}
        INPUT_SYSROOT: ${{ inputs.sysroot }}
        INPUT_NOSTDINC: ${{ inputs.nostdinc }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_OUTPUT_FILE: ${{ inputs.output-file }}
        INPUT_POLICY: ${{ inputs.policy }}
        INPUT_POLICY_FILE: ${{ inputs.policy-file }}
        INPUT_SUPPRESS: ${{ inputs.suppress }}
        INPUT_VERBOSE: ${{ inputs.verbose }}
        INPUT_FOLLOW_DEPS: ${{ inputs.follow-deps }}
        INPUT_OLD_ROOT: ${{ inputs.old-root }}
        INPUT_NEW_ROOT: ${{ inputs.new-root }}
        INPUT_USED_BY: ${{ inputs.used-by }}
        INPUT_VERIFY_RUNTIME: ${{ inputs.verify-runtime }}
        INPUT_REQUIRED_SYMBOL: ${{ inputs.required-symbol }}
        INPUT_REQUIRED_SYMBOLS: ${{ inputs.required-symbols }}
        INPUT_AGAINST: ${{ inputs.against }}
        INPUT_SEARCH_PATH: ${{ inputs.search-path }}
        INPUT_LD_LIBRARY_PATH: ${{ inputs.ld-library-path }}
        INPUT_FAIL_ON_BREAKING: ${{ inputs.fail-on-breaking }}
        INPUT_FAIL_ON_API_BREAK: ${{ inputs.fail-on-api-break }}
        INPUT_SEVERITY_PRESET: ${{ inputs.severity-preset }}
        INPUT_SEVERITY_ADDITION: ${{ inputs.severity-addition }}
        INPUT_EXTRA_ARGS: ${{ inputs.extra-args }}
        INPUT_ABI_BASELINE: ${{ inputs.abi-baseline }}
        INPUT_JOBS: ${{ inputs.jobs }}
        INPUT_ADD_JOB_SUMMARY: ${{ inputs.add-job-summary }}
        INPUT_DEBUG_INFO1: ${{ inputs.debug-info1 }}
        INPUT_DEBUG_INFO2: ${{ inputs.debug-info2 }}
        INPUT_DEVEL_PKG1: ${{ inputs.devel-pkg1 }}
        INPUT_DEVEL_PKG2: ${{ inputs.devel-pkg2 }}
        INPUT_DSO_ONLY: ${{ inputs.dso-only }}
        INPUT_INCLUDE_PRIVATE_DSO: ${{ inputs.include-private-dso }}
        INPUT_KEEP_EXTRACTED: ${{ inputs.keep-extracted }}
        INPUT_FAIL_ON_REMOVED_LIBRARY: ${{ inputs.fail-on-removed-library }}
        INPUT_PR_COMMENT: ${{ inputs.pr-comment }}
        INPUT_PR_COMMENT_MODE: ${{ inputs.pr-comment-mode }}
        INPUT_PR_COMMENT_ON: ${{ inputs.pr-comment-on }}
        INPUT_PR_COMMENT_DETAIL: ${{ inputs.pr-comment-detail }}
        INPUT_SOURCES: ${{ inputs.sources }}
        INPUT_BUILD_INFO: ${{ inputs.build-info }}
        INPUT_COMPILE_DB: ${{ inputs.compile-db }}
        INPUT_BUILD_CONFIG: ${{ inputs.build-config }}
        INPUT_ALLOW_BUILD_QUERY: ${{ inputs.allow-build-query }}
        INPUT_DEPTH: ${{ inputs.depth }}
        INPUT_SINCE: ${{ inputs.since }}
        INPUT_CHANGED_PATH: ${{ inputs.changed-path }}
        INPUT_BUDGET: ${{ inputs.budget }}
        INPUT_DRY_RUN: ${{ inputs.dry-run }}
        INPUT_ESTIMATE: ${{ inputs.estimate }}
        INPUT_AUDIT: ${{ inputs.audit }}
        INPUT_CROSSCHECK: ${{ inputs.crosscheck }}
        INPUT_RISK_RULES: ${{ inputs.risk-rules }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: bash "${{ github.action_path }}/action/run.sh"

    # ── 5. Upload SARIF ──────────────────────────────────────────────────────
    - name: Upload SARIF to Code Scanning
      if: inputs.upload-sarif == 'true' && inputs.format == 'sarif' && steps.run-abicheck.outputs.report-path != ''
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ steps.run-abicheck.outputs.report-path }}
        category: abicheck
      continue-on-error: true
