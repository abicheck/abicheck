# abicheck — plugin data collection for oneDAL (source facts → enriched baseline)
#
# Demonstrates the abicheck *Clang facts plugin* (contrib/abicheck-clang-plugin):
# during a normal clang compile it emits normalized source facts
# (abicheck_inputs/), which `abicheck merge` folds into a binary snapshot to link
# exported symbols back to their source declarations (the L4/L5 evidence). This
# is the "integration via plugin data collection" path.
#
# ⚠ ABI-lock caveat (ADR-038 C.5): the plugin must be loaded by the SAME clang
# major it was built against. oneDAL's production build uses Intel icx; a plugin
# built against upstream LLVM may not load into icx. This job builds the plugin
# against stock clang and collects facts over the public-header surface with that
# same stock clang — a self-contained, always-green demonstration. For the full
# build, prefer the portable `abicheck-cc` wrapper (Flow B) around icx, or a
# compile_commands.json + `dump --sources` (see the guide). Non-blocking.
name: oneDAL ABI — plugin data collection (demo)

on:
  workflow_dispatch:
    inputs:
      llvm-major:
        description: "LLVM/Clang major to build the plugin against"
        required: true
        default: "18"

permissions:
  contents: read

jobs:
  plugin-collect:
    name: collect source facts (LLVM ${{ inputs.llvm-major }})
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout oneDAL
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # The plugin lives in the abicheck repo; check it out alongside.
      - name: Checkout abicheck (for the plugin sources)
        uses: actions/checkout@v4
        with:
          repository: abicheck/abicheck
          ref: v0.4.0
          path: .abicheck-src
          persist-credentials: false

      - name: Install clang/LLVM ${{ inputs.llvm-major }} + build tools
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            clang-${{ inputs.llvm-major }} llvm-${{ inputs.llvm-major }}-dev \
            libclang-${{ inputs.llvm-major }}-dev cmake ninja-build
          sudo ln -sf /usr/bin/clang++-${{ inputs.llvm-major }} /usr/local/bin/clang++
          sudo ln -sf /usr/bin/clang-${{ inputs.llvm-major }} /usr/local/bin/clang
          clang++ --version

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install abicheck
        run: pip install "abicheck==0.4.0"

      - name: Build the abicheck facts plugin
        run: |
          set -euxo pipefail
          cmake -S .abicheck-src/contrib/abicheck-clang-plugin -B build/plugin -G Ninja \
            -DCMAKE_PREFIX_PATH="/usr/lib/llvm-${{ inputs.llvm-major }}"
          cmake --build build/plugin
          test -f build/plugin/libabicheck-facts.so

      # Collect facts over the public DAAL surface via an umbrella TU. This needs
      # only the public include dir — no MKL/TBB — so it is self-contained. The
      # oneAPI/SYCL surface needs a SYCL front-end (icx) and is out of scope for
      # this stock-clang demo (see the guide's caveats).
      - name: Emit source facts for the public headers (plugin)
        continue-on-error: true
        run: |
          set -uxo pipefail
          mkdir -p tu
          # Umbrella TU: include the classic DAAL public API.
          echo '#include <daal.h>' > tu/onedal_surface.cpp
          clang++ -std=c++17 -Icpp/daal/include -fsyntax-only \
            -fplugin=./build/plugin/libabicheck-facts.so \
            -Xclang -plugin-arg-abicheck-facts -Xclang out=abicheck_inputs \
            -Xclang -plugin-arg-abicheck-facts -Xclang public-roots=cpp/daal/include \
            -Xclang -plugin-arg-abicheck-facts -Xclang library=onedal_core \
            tu/onedal_surface.cpp
          echo "collected packs:"; find abicheck_inputs -maxdepth 2 -type f | head -20

      - name: Merge source facts into the baseline snapshot
        continue-on-error: true
        run: |
          set -uxo pipefail
          base=".abicheck/baseline-2026.0.0/libonedal_core.abi.json"
          if [[ -f "$base" && -d abicheck_inputs ]]; then
            abicheck merge "$base" abicheck_inputs/ -o libonedal_core.enriched.json
            echo "── merge coverage (read the L4 line) ──"
          else
            echo "::warning::Need $base (baseline workflow) and a non-empty abicheck_inputs/ to merge."
          fi

      - name: Upload enriched snapshot + facts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: onedal-abicheck-plugin-facts
          path: |
            abicheck_inputs/
            libonedal_core.enriched.json
          if-no-files-found: ignore
