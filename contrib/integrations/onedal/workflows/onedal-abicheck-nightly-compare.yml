# abicheck — nightly binary ABI compare (current oneDAL vs 2026.0.0 baseline)
#
# The heavy, authoritative gate. Builds the current tree with oneDAL's toolchain
# and compares each shared library against its committed 2026.0.0 baseline
# snapshot at the binary+DWARF level. Uploads SARIF to code scanning and writes a
# job summary. Advisory by default (continue-on-error) — this is a pre-release
# validation run, not yet a merge blocker.
#
# Not run per-PR: a full icx+MKL oneDAL build is minutes-to-tens-of-minutes; the
# per-PR signal comes from the (buildless) source scan. Run nightly + on demand.
name: oneDAL ABI — nightly compare

on:
  schedule:
    - cron: "0 4 * * *"     # 04:00 UTC nightly
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # upload SARIF to code scanning

concurrency:
  group: onedal-abicheck-compare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compare:
    name: compare vs 2026.0.0
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      BASELINE_DIR: .abicheck/baseline-2026.0.0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Guard — baseline present
        run: |
          if [[ ! -d "$BASELINE_DIR" ]] || ! ls "$BASELINE_DIR"/*.abi.json >/dev/null 2>&1; then
            echo "::error::No baseline under $BASELINE_DIR. Run the baseline workflow first."
            exit 1
          fi

      - name: Install DPC++ / MKL / miniforge
        run: |
          .ci/env/apt.sh dpcpp
          .ci/env/apt.sh mkl
          .ci/env/apt.sh miniforge

      - name: Build current oneDAL release libraries
        run: |
          set -euxo pipefail
          source /opt/intel/oneapi/setvars.sh
          .ci/scripts/build.sh --compiler icx --optimizations avx2 --target daal     --debug symbols --jobs "$(nproc)"
          .ci/scripts/build.sh --compiler icx --optimizations avx2 --target oneapi_c --debug symbols --jobs "$(nproc)"

      - name: Locate the release lib dir
        id: rel
        run: echo "libdir=$(find . -path '*/daal/latest/lib/intel64' -type d | head -1)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install abicheck
        run: pip install "abicheck==0.4.0"

      - name: Compare each library against its baseline (SARIF)
        continue-on-error: true      # advisory pre-release posture
        run: |
          set -uxo pipefail
          libdir="${{ steps.rel.outputs.libdir }}"
          mkdir -p reports
          : > reports/verdicts.txt
          for base in "$BASELINE_DIR"/*.abi.json; do
            stem="$(basename "$base" .abi.json)"           # libonedal_core
            so="$(find "$libdir" -maxdepth 1 -name "$stem.so.*" ! -type l | head -1)"
            if [[ -z "$so" ]]; then
              echo "::warning::$stem present in baseline but not built now — possible removed library."
              echo "$stem REMOVED_LIBRARY" >> reports/verdicts.txt
              continue
            fi
            echo "::group::compare $stem"
            abicheck compare "$base" "$so" \
              --config .abicheck.yml \
              --suppress onedal.suppress.yml \
              --policy sdk_vendor \
              --format sarif -o "reports/$stem.sarif" || true
            # Human-readable summary alongside the SARIF.
            abicheck compare "$base" "$so" \
              --config .abicheck.yml --suppress onedal.suppress.yml --policy sdk_vendor \
              --format markdown >> "$GITHUB_STEP_SUMMARY" || true
            echo "::endgroup::"
          done

      - name: Merge SARIF files
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, glob, pathlib
          runs = []
          for p in sorted(glob.glob("reports/*.sarif")):
              try:
                  runs += json.load(open(p)).get("runs", [])
              except Exception as e:
                  print(f"skip {p}: {e}")
          out = {"version": "2.1.0",
                 "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
                 "runs": runs}
          pathlib.Path("reports/onedal-abicheck.sarif").write_text(json.dumps(out))
          print(f"merged {len(runs)} run(s)")
          PY

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/onedal-abicheck.sarif
          category: abicheck
        continue-on-error: true

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: onedal-abicheck-compare-reports
          path: reports/
