# abicheck — PR source-level ABI/API scan for oneDAL
#
# The everyday PR gate. Runs abicheck's source-intelligence scan over the files
# a PR touches, projected against the committed 2026.0.0 baseline snapshot — so
# it needs NO oneDAL build (no MKL/TBB, ~1 min). Advisory by default (writes a
# job summary + artifact, never blocks) so you can validate signal before enforcing.
#
# Prereqs (one-time, see the integration guide):
#   * .abicheck.yml               at the repo root   (from config/onedal.abicheck.yml)
#   * onedal.suppress.yml         at the repo root   (from config/onedal.suppress.yml)
#   * .abicheck/baseline-2026.0.0/*.abi.json         (from the baseline workflow)
#
# Pin `abicheck/abicheck@vX` to a published release tag or a commit SHA before
# relying on it. Examples here use v0.4.0.
name: oneDAL ABI — PR source scan

on:
  pull_request:
    paths:
      - "cpp/daal/include/**"
      - "cpp/oneapi/dal/**"
      - ".abicheck.yml"
      - "onedal.suppress.yml"
  workflow_dispatch:

permissions:
  contents: read          # read the checkout + committed baseline
  # No pull-requests: write — scan reports via the job summary + artifact, not a
  # PR comment (PR comments are a compare/appcompat-mode feature).

concurrency:
  group: onedal-abicheck-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-scan:
    name: scan ${{ matrix.iface.name }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        iface:
          # Each public interface is anchored to its release snapshot. The
          # snapshot supplies the exported-symbol surface; --sources + --since
          # supply the source delta the scan reasons about.
          - name: daal-core
            baseline: .abicheck/baseline-2026.0.0/libonedal_core.abi.json
            headers: cpp/daal/include
          - name: oneapi-dal
            baseline: .abicheck/baseline-2026.0.0/libonedal.abi.json
            headers: cpp/oneapi/dal
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # required for `since: origin/<base>` change focusing
          persist-credentials: false

      - name: Guard — baseline snapshot present
        run: |
          if [[ ! -f "${{ matrix.iface.baseline }}" ]]; then
            echo "::error::Missing baseline ${{ matrix.iface.baseline }}. Run the"
            echo "::error::'oneDAL ABI — build 2026.0.0 baseline' workflow and commit its output first."
            exit 1
          fi

      - name: Source-intelligence scan (${{ matrix.iface.name }})
        uses: abicheck/abicheck@v0.4.0
        with:
          mode: scan
          # The .abi.json snapshot IS the scanned surface — no build needed.
          new-library: ${{ matrix.iface.baseline }}
          new-header: ${{ matrix.iface.headers }}
          sources: .
          # NOTE: no `config:`/`suppress:` inputs here on purpose.
          #  * scan AUTO-DISCOVERS `.abicheck.yml` at the --sources root, so the
          #    project config (scope/severity/exclude) applies without an input —
          #    and this works on any action version. (The action also accepts
          #    `build-config: .abicheck.yml` once you're on a version where scan's
          #    config flag is fixed; auto-discovery avoids that dependency.)
          #  * scan does NOT take a suppress file (the `suppress:` input is a
          #    no-op in scan mode). scan noise is controlled by scope.public +
          #    sources.exclude in .abicheck.yml and `--crosscheck KEY=off`.
          depth: source                              # L4 source-ABI replay of changed TUs
          since: origin/${{ github.base_ref }}       # scope the (expensive) replay to the PR
          budget: 12m                                # fail loudly rather than overrun
          format: json
          output-file: onedal-scan-${{ matrix.iface.name }}.json
          # Advisory posture: report, don't block. Flip these to true (and tighten
          # severity in .abicheck.yml) when you enforce for the next release.
          fail-on-breaking: false
          fail-on-api-break: false
          # scan's output channel is the JOB SUMMARY + the uploaded artifact.
          # The action's sticky PR comment is a compare/compare-release/appcompat
          # feature only — it is a no-op in scan mode, so it is not set here. (A
          # buildless PR compare that *would* comment isn't possible: compare needs
          # a freshly built .so, which is the nightly job.)
          add-job-summary: true

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: onedal-abicheck-scan-${{ matrix.iface.name }}
          path: onedal-scan-${{ matrix.iface.name }}.json
          if-no-files-found: ignore
