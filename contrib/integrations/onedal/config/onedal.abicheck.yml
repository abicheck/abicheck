# .abicheck.yml — oneDAL ABI/API contract (drop at the oneDAL repo root)
#
# Stable, reviewed-in-a-PR properties of oneDAL's ABI surface. Per-run flags
# (depth, since, format, output) stay in the workflows; CLI > config > default.
# Schema: https://abicheck.github.io/abicheck/reference/config-file/
#
# Validated against oneDAL 2026.0.0 (tag 2026.0.0, soname major .so.4).
version: 1

# ── Build-system hint ────────────────────────────────────────────────────────
# oneDAL's release libraries are produced by the top-level `makefile`
# (`make -f makefile daal|onedal_c PLAT=lnx32e`). A compile_commands.json is NOT
# emitted by that build, so L3/L4/L5 source evidence needs one of:
#   * bazel:  `bazel aquery ... > aquery.json` → `abicheck collect --from bazel-aquery=aquery.json`
#   * bear:   `bear -- make -f makefile daal PLAT=lnx32e`  (wraps the make build)
#   * plugin: the abicheck clang facts plugin (see workflows/onedal-abicheck-plugin-collect.yml)
# Point `compile_db` at whichever you generate; leave it unset for symbol+header
# (L0/L1/L2) analysis, which needs no compile DB.
build:
  system: make
  # compile_db: build/compile_commands.json

# ── Public-header surface (L2 header AST + provenance scoping) ────────────────
# Two public interfaces ship from one tree:
#   * cpp/daal/include  — the classic DAAL C++ API (plain C++17, parses cleanly)
#   * cpp/oneapi/dal    — the oneAPI DAL API (host headers parse; the SYCL/DPC++
#                         headers need a SYCL front-end — see the guide's caveats)
sources:
  public_headers:
    - cpp/daal/include
    - cpp/oneapi/dal
  # Internal implementation detail — never part of the ABI contract. Excluded so
  # churn here never raises a finding and never floods the public surface.
  exclude:
    - "**/detail/**"
    - "**/backend/**"
    - "**/internal/**"
    - "cpp/oneapi/dal/test/**"
    - "cpp/daal/src/**"
    - "**/*_test.*"
    - "examples/**"
    - "samples/**"
  graph: summary   # cheap changed-scope L5 graph for PR runs; nightly can go full

# ── Severity policy (drives compare exit codes) ──────────────────────────────
# Not-a-prod-deployment posture: hard-gate only on true binary ABI breaks;
# surface source-level and quality signals as warnings/info so the pipeline is
# informative before it is enforcing. Tighten to `error` per category when you
# are ready to enforce for the next release.
severity:
  preset: default
  abi_breaking: error          # removed/changed exported symbols, layout breaks
  potential_breaking: warning  # source-compatible-but-risky
  quality_issues: info
  addition: info               # new public API is reported, never gates

# ── Public-surface scoping (the main false-positive control) ─────────────────
scope:
  public: true                 # restrict to the exported surface
  collapse_versioned_symbols: true

# ── L2 header compile context ────────────────────────────────────────────────
# oneDAL is built with clang/icx; castxml's bundled front-end chokes on the
# AVX-512/SYCL intrinsics in these headers, so pin the clang front-end.
compile:
  frontend: clang
  std: c++17
  # NOTE: `compile.include_dirs` is intentionally omitted. abicheck *existence-
  # checks* it and hard-errors (exit 64) if any entry is missing relative to this
  # file, which makes the config fragile to run location. The workflows pass the
  # header roots explicitly (`new-header`/`-H`) instead, and `sources.public_headers`
  # above already establishes the public surface. Add include_dirs back only if you
  # run abicheck from the repo root and every listed dir exists.
  #
  # Add the defines oneDAL's public headers expect for your target here (mirror
  # the release build's -D flags). Left empty on purpose — invented defines only
  # break parsing. Inspect a compile line from `make ... V=1` or a compile DB.
  defines: []

# ── Suppression hygiene ──────────────────────────────────────────────────────
# The rules themselves live in onedal.suppress.yml (passed via `suppress:` in
# the workflows); this block is the *policy* for how strictly they are treated.
suppression:
  strict: false
  require_justification: true   # every future suppression must say why
