# Scenario group: CI ABI gating (persona: CI engineer)
#
# See tests/scenarios/README.md for the catalog format and how it is validated.
schema_version: 1

scenarios:
  - id: SC-CI-GATE-BREAKING
    title: CI ABI gate fails the build on a removed public symbol
    persona: CI engineer
    narrative: >
      A pull request drops a public function from a shared library. The ABI gate
      in CI must fail (non-zero exit) so the breaking change cannot merge
      silently.
    flow:
      - abicheck compare old.json new.json
    expected:
      exit_code: 4
      verdict: BREAKING
    validates: UC-WF-compare
    automated: true
    test: test_sc_ci_gate_breaking

  - id: SC-CI-GATE-ADDITIVE
    title: CI ABI gate passes a backward-compatible addition
    persona: CI engineer
    narrative: >
      A release adds a new exported function and changes nothing else. The gate
      must pass (exit 0) so additive work is not blocked.
    flow:
      - abicheck compare old.json new.json
    expected:
      exit_code: 0
      verdict: COMPATIBLE
    validates: UC-WF-compare
    automated: true
    test: test_sc_ci_gate_additive

  - id: SC-EXIT-CONTRACT
    title: Exit-code contract (0 / 2 / 4) is stable for tooling
    persona: CI engineer
    narrative: >
      Build scripts gate on exit codes: 0 = compatible, 2 = source-level
      (API) break, 4 = binary (ABI) break. This contract must hold so a
      Makefile/pipeline can branch on it.
    flow:
      - abicheck compare old.json new.json   # exit code is the gate
    expected:
      exit_codes: {NO_CHANGE: 0, API_BREAK: 2, BREAKING: 4}
    validates: UC-WF-compare
    automated: true
    test: test_sc_exit_contract

  - id: SC-CI-SEVERITY-GATE
    title: Severity policy turns an ABI break into a warning (custom gate)
    persona: CI engineer
    narrative: >
      A team is mid-migration and wants ABI breaks reported but NOT
      build-failing for one release. Passing a --severity-* flag switches to the
      severity-aware exit scheme; downgrading abi_breaking to "warning" yields
      exit 0 while the default gate still fails with exit 4.
    flow:
      - abicheck compare old.json new.json --severity-abi-breaking warning
    expected:
      exit_code: 0
      default_exit_code: 4
    validates: UC-WF-compare
    automated: true
    test: test_sc_ci_severity_gate

  - id: SC-CI-STAT
    title: One-line --stat summary for CI logs
    persona: CI engineer
    narrative: >
      A pipeline wants a compact, greppable one-line result in the job log
      instead of a full report.
    flow:
      - abicheck compare old.json new.json --stat
    expected:
      exit_code: 4
      output_contains: total
    validates: UC-WF-compare
    automated: true
    test: test_sc_ci_stat

  # oneDAL-style bundle PR gate: block confirmed public breaks, warn (don't
  # block) when analysis could not confidently confirm the public surface.
  - id: SC-ONEDAL-PR-GATE-STRICT
    title: Block oneDAL PRs on public ABI/API break, warn on unconfirmed analysis
    persona: oneDAL maintainer
    narrative: >
      A pull request changes oneDAL shared libraries or public headers. CI must
      stop merges for confirmed public BREAKING or API_BREAK findings, but must
      only warn (not block) when compatibility cannot be confidently confirmed —
      the public-surface scope fell back, or the verdict is COMPATIBLE_WITH_RISK.
      Because exit 0 covers NO_CHANGE / COMPATIBLE / COMPATIBLE_WITH_RISK, the
      gate inspects the JSON `verdict` field rather than relying on exit codes
      alone, and uses compare-release so sibling-library relationships in the
      bundle are analysed.
    flow:
      - abicheck compare-release baseline/ pr-build/ -H include/ --scope-public-headers --format json -o abi.json
      - abicheck compare-release baseline/ pr-build/ -H include/ --scope-public-headers --format sarif -o abi.sarif
    expected:
      fail_on_verdicts: [BREAKING, API_BREAK]
      manual_review_required_on:
        - verdict == COMPATIBLE_WITH_RISK
        - warnings not empty
        - public-surface scope fallback occurred
      require_bundle_analysis: true
      require_public_surface_scope: true
    validates: UC-WF-bundle
    automated: false
    status: planned
    plan: docs/development/plans/g2-build-config-and-bundle.md

  # oneDAL-style additive surface tracking: report growth, never gate on it.
  - id: SC-ONEDAL-PR-ADDITION-TRACKING
    title: Report oneDAL API/ABI additions without gating the PR
    persona: oneDAL maintainer
    narrative: >
      A pull request legitimately expands oneDAL's surface. CI must not block the
      merge on additions alone, but it must clearly separate public additions
      from internal-only growth (using public-header scoping plus the
      --show-filtered ledger) and communicate the release impact to reviewers via
      a job summary / PR comment rather than raw JSON.
    flow:
      - abicheck compare-release baseline/ pr-build/ -H include/ --scope-public-headers --show-filtered --format json -o abi.json
      - abicheck compare-release baseline/ pr-build/ -H include/ --scope-public-headers --format html -o abi.html
    expected:
      fail_on_verdicts: [BREAKING, API_BREAK]
      do_not_fail_on: [COMPATIBLE]
      require_summary_fields:
        - public_additions
        - filtered_internal_changes
        - changed_libraries
        - release_recommendation
      github_presentation: [job_summary, pr_comment]
    validates: UC-WF-bundle
    automated: false
    status: planned
    plan: docs/development/plans/g3-workflow-examples-and-reporting.md
